[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "pyprompt"
version = "0.0.0"
description = "PyPrompt Hello World grammar bootstrap"
requires-python = ">=3.11"
dependencies = [
    "interegular>=0.3,<1",
    "lark>=1.2,<2",
]

[tool.setuptools]
packages = ["pyprompt"]

[tool.setuptools.package-data]
pyprompt = ["grammars/*.lark"]
