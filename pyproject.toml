[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "pyprompt"
version = "0.0.0"
description = "PyPrompt Hello World grammar bootstrap"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = [
    "interegular>=0.3,<1",
    "lark>=1.2,<2",
]

[tool.setuptools]
packages = ["pyprompt"]

[tool.setuptools.package-data]
pyprompt = ["grammars/*.lark"]

[tool.pyprompt.emit]

[[tool.pyprompt.emit.targets]]
name = "example_07_handoffs"
entrypoint = "examples/07_handoffs/prompts/AGENTS.prompt"
output_dir = "examples/07_handoffs/build"

[[tool.pyprompt.emit.targets]]
name = "example_14_handoff_truth"
entrypoint = "examples/14_handoff_truth/prompts/AGENTS.prompt"
output_dir = "examples/14_handoff_truth/build"
