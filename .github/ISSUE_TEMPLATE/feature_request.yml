name: Feature request
description: Propose a concrete language, compiler, or docs improvement.
title: "feature: "
labels:
  - kind:additive
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      placeholder: I can express X, but not Y, without duplicated prompt source...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the narrowest useful addition.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: What did you try already?
      description: List current workarounds or nearby features.
