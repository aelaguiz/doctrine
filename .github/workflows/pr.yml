name: PR

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  tests:
    name: tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python toolchain
        uses: ./.github/actions/setup-python-uv

      - name: Set up Node toolchain
        uses: ./.github/actions/setup-node-npm
        with:
          cache-dependency-path: package-lock.json

      - name: Sync Python dependencies
        run: uv sync

      - name: Install flow renderer dependency
        run: npm ci

      - name: Run unit tests
        run: make tests

  diagnostics:
    name: diagnostics
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python toolchain
        uses: ./.github/actions/setup-python-uv

      - name: Set up Node toolchain
        uses: ./.github/actions/setup-node-npm
        with:
          cache-dependency-path: package-lock.json

      - name: Sync Python dependencies
        run: uv sync

      - name: Install flow renderer dependency
        run: npm ci

      - name: Run diagnostics proof
        run: make verify-diagnostics

  verify-examples:
    name: verify-examples
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python toolchain
        uses: ./.github/actions/setup-python-uv

      - name: Set up Node toolchain
        uses: ./.github/actions/setup-node-npm
        with:
          cache-dependency-path: package-lock.json

      - name: Sync Python dependencies
        run: uv sync

      - name: Install flow renderer dependency
        run: npm ci

      - name: Run shipped corpus
        run: make verify-examples

  packaging:
    name: packaging
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python toolchain
        uses: ./.github/actions/setup-python-uv

      - name: Set up Node toolchain
        uses: ./.github/actions/setup-node-npm
        with:
          cache-dependency-path: package-lock.json

      - name: Sync Python dependencies
        run: uv sync

      - name: Install flow renderer dependency
        run: npm ci

      - name: Smoke test built package artifacts
        run: make verify-package

  vscode:
    name: vscode
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node toolchain
        uses: ./.github/actions/setup-node-npm
        with:
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Set up Python toolchain
        uses: ./.github/actions/setup-python-uv

      - name: Check whether VS Code files changed
        id: changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -q '^editors/vscode/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip VS Code lane when no extension files changed
        if: steps.changes.outputs.changed != 'true'
        run: printf '%s\n' 'No editors/vscode changes in this pull request.'

      - name: Build VS Code extension
        if: steps.changes.outputs.changed == 'true'
        run: xvfb-run -a make -C editors/vscode
