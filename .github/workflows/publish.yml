name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build and smoke test.
        required: true
        default: main
        type: string
      publish_target:
        description: Package index to publish to.
        required: true
        default: none
        type: choice
        options:
          - none
          - testpypi
          - pypi

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CHECKOUT_REF: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.ref }}
    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ env.CHECKOUT_REF }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Build source and wheel artifacts
        run: uv build

      - name: Smoke test wheel from a temp project
        run: |
          set -euo pipefail
          wheel_path="$(python - <<'PY'
          import pathlib
          wheels = sorted(pathlib.Path("dist").glob("*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"expected exactly one wheel, found {len(wheels)}")
          print(wheels[0].resolve())
          PY
          )"
          tmp_root="$(mktemp -d)"
          project_root="$tmp_root/smoke-project"
          venv_root="$tmp_root/venv"
          python -m venv "$venv_root"
          "$venv_root/bin/pip" install --upgrade pip
          "$venv_root/bin/pip" install "$wheel_path"
          mkdir -p "$project_root/prompts"
          cat > "$project_root/prompts/AGENTS.prompt" <<'EOF'
          agent HelloWorld:
              role: "You are the hello world agent."

              workflow: "Instruction"
                  "Say hello world."
          EOF
          cat > "$project_root/pyproject.toml" <<'EOF'
          [project]
          name = "doctrine-smoke"
          version = "0.0.0"

          [tool.doctrine.emit]

          [[tool.doctrine.emit.targets]]
          name = "smoke"
          entrypoint = "prompts/AGENTS.prompt"
          output_dir = "build"
          EOF
          (
            cd "$project_root"
            "$venv_root/bin/python" -m doctrine.emit_docs --pyproject "$project_root/pyproject.toml" --target smoke
          )
          grep -R "Say hello world." "$project_root/build" >/dev/null

      - name: Store distribution artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Upload release assets
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/* --clobber

  publish-testpypi:
    name: publish-testpypi
    if: github.event_name == 'workflow_dispatch' && inputs.publish_target == 'testpypi' && vars.TEST_PYPI_PUBLISH_ENABLED == 'true'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/doctrine-agents/
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: publish-pypi
    if: (github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish_target == 'pypi')) && vars.PYPI_PUBLISH_ENABLED == 'true'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/doctrine-agents/
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
