version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "deps(actions)"
    labels:
      - dependencies
      - kind:ci
    open-pull-requests-limit: 5

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "deps(python)"
    labels:
      - dependencies
      - kind:packaging
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "deps(flow)"
    labels:
      - dependencies
      - kind:ci
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/editors/vscode"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "deps(vscode)"
    labels:
      - dependencies
      - area:vscode
    open-pull-requests-limit: 5
