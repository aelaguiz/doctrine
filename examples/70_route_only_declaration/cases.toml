schema_version = 1
default_prompt = "prompts/AGENTS.prompt"

[[cases]]
name = "route_only lowers through the shipped route-only workflow-law path"
status = "active"
kind = "render_contract"
agent = "RouteRepairDemo"
assertion = "exact_lines"
expected_lines = [
  "Keep route-only repair explicit when no specialist artifact is current.",
  "",
  "## Route Repair",
  "",
  "Emit Route Repair Comment.",
  "",
  "Use this pass only when route facts live job is route_repair and current specialist output is missing.",
  "",
  "No artifact is current for this pass.",
  "",
  "Stop: No specialist artifact is current for this turn.",
  "",
  "Choose one mode for this turn:",
  "- Draft Author",
  "- Routing Owner",
  "",
  "When the mode is Draft Author:",
  "- Route to Draft Author.",
  "",
  "When the mode is Routing Owner:",
  "- Route to Routing Owner.",
  "",
  "Else:",
  "- Route to Routing Owner.",
  "",
  "## Inputs",
  "",
  "### Route Facts",
  "",
  "- Source: Prompt",
  "- Shape: Json Object",
  "- Requirement: Required",
  "",
  "Use the host route facts. They say whether route repair is active, whether the current specialist output is missing, which owner takes the next pass, whether rewrite mode is live, and what the next step is.",
  "",
  "## Outputs",
  "",
  "### Route Repair Comment",
  "",
  "| Contract | Value |",
  "| --- | --- |",
  "| Target | Turn Response |",
  "| Shape | Comment |",
  "| Requirement | Required |",
  "",
  "#### Must Include",
  "",
  "| Field | What to write |",
  "| --- | --- |",
  "| **Current Route** | Say the route-only state now in force. |",
  "| **Next Owner** | Name the next owner. Use DraftAuthor when repair goes back to draft work and RoutingOwner when routing keeps the issue local. |",
  "| **Next Step** | Say the next concrete step now. |",
  "",
  "#### Rewrite Mode",
  "",
  "Show this only when route facts section status is new or full rewrite.",
  "",
  "Say plainly that later metadata must be rewritten instead of inherited.",
  "",
  "#### Standalone Read",
  "",
  "This comment should stand on its own. The next owner should know that no specialist artifact is current, which route-only state is active, who owns next, and what step comes next.",
]
[[cases]]
name = "route_only rejects abstract route targets"
status = "active"
kind = "compile_fail"
prompt = "prompts/invalid_abstract_route_target/AGENTS.prompt"
agent = "InvalidRouteOnlyTargetDemo"
exception_type = "CompileError"
error_code = "E282"
location_line = 32

[[cases]]
