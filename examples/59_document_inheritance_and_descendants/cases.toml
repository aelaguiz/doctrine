[[cases]]
name = "document overrides fail when the child changes block kind"
status = "active"
kind = "compile_fail"
prompt = "prompts/invalid_document_override_kind_mismatch/AGENTS.prompt"
agent = "BrokenLessonPlanDemo"
exception_type = "CompileError"
error_code = "E305"
location_line = 7
related = [
    { label = "inherited `read_order` entry", line = 2 },
]
