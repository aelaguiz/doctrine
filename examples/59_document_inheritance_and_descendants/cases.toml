  "",
  "## Adapt",
  "",
  "Write the adapted lesson plan using the inherited document.",
  "",
  "## Outputs",
  "",
  "### Adapted Lesson Plan File",
  "",
  "| Contract | Value |",
  "| --- | --- |",
  "| Target | File |",
  "| Path | `lesson_root/ADAPTED_LESSON_PLAN.md` |",
  "| Shape | Markdown Document |",
  "| Requirement | Required |",
  "| Structure | Adapted Lesson Plan |",
  "",
  "#### Artifact Structure",
  "",
  "This artifact must follow the `Adapted Lesson Plan` structure below.",
  "",
  "| Required Section | Kind | What it must do |",
  "| --- | --- | --- |",
