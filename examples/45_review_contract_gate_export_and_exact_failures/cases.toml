schema_version = 1
default_prompt = "prompts/AGENTS.prompt"

[[cases]]
name = "review contract gates stay exact and readable in output"
status = "active"
kind = "render_contract"
agent = "ExactGateReviewDemo"
assertion = "exact_lines"
expected_lines = [
  "Keep exact shared-contract gate identities visible in review output.",
  "",
  "## Exact Gate Review",
  "",
  "Review subject: Draft Spec.",
  "Shared review contract: Exact Gate Review Contract.",
  "",
  "### Contract Gate Checks",
  "",
  "Reject: Clarity.",
  "",
  "Reject: Handoff Truth.",
  "",
  "Accept only if The shared review contract passes.",
  "",
  "### If Accepted",
  "",
  "No artifact is current for this outcome.",
  "",
  "Accepted draft goes to ReviewLead.",
  "",
  "### If Rejected",
  "",
  "No artifact is current for this outcome.",
  "",
  "Rejected draft goes to DraftAuthor.",
  "",
  "## Inputs",
  "",
  "### Draft Spec",
  "",
  "- Source: File",
  "- Path: `unit_root/DRAFT_SPEC.md`",
  "- Shape: Markdown Document",
  "- Requirement: Required",
  "",
  "Use the current draft spec as the reviewed artifact.",
  "",
  "## Outputs",
  "",
  "### Exact Gate Review Comment",
  "",
  "| Contract | Value |",
  "| --- | --- |",
  "| Target | Turn Response |",
  "| Shape | Comment |",
  "| Requirement | Required |",
  "",
  "#### Verdict",
  "",
  "Say whether the review accepted the draft or asked for changes.",
  "",
  "#### Reviewed Artifact",
  "",
  "Name the reviewed artifact this review judged.",
  "",
  "#### Analysis Performed",
  "",
  "Sum up the review work that led to the verdict.",
  "",
  "#### Output Contents That Matter",
  "",
  "Summarize the parts of the draft the next owner must read first.",
  "",
  "#### Next Owner",
  "",
  "Name the next owner. Use ReviewLead when the draft is accepted and DraftAuthor when it is rejected.",
  "",
  "#### Failure Detail",
  "",
  "Show this only when verdict is changes requested.",
  "",
  "##### Failing Gates",
  "",
  "List the exact shared-contract gate names in authored order, including Completeness, Clarity, and Handoff Truth when they fail.",
  "",
  "#### Standalone Read",
  "",
  "This comment should stand on its own. The next owner should know what Reviewed Artifact was reviewed, what verdict landed, who owns next, and which shared contract gates failed.",
]

[[cases]]
name = "contract gate refs must name exported review-contract gates"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_UNKNOWN_CONTRACT_GATE.prompt"
agent = "InvalidUnknownContractGateDemo"
exception_type = "CompileError"
error_code = "E477"
message_contains = [
  "contract.missing_gate",
  "Unknown review contract gate",
]

[[cases]]
name = "review contracts may not target operational workflows with law"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_CONTRACT_TARGET_WITH_LAW.prompt"
agent = "InvalidContractTargetWithLawDemo"
exception_type = "CompileError"
error_code = "E477"
message_contains = [
  "unsupported workflow features",
  "OperationalWorkflow",
]
