schema_version = 1
default_prompt = "prompts/AGENTS.prompt"

[[cases]]
name = "python-like imports compose simple and chained workflows"
status = "active"
kind = "render_contract"
agent = "ImportsDemo"
assertion = "exact_lines"
approx_ref = "ref/AGENTS.md"
expected_lines = [
  "You are the imports demonstration agent.",
  "",
  "## Imported Steps",
  "",
  "Follow the imported instructions below.",
  "",
  "### Greeting",
  "",
  "Say hello.",
  "",
  "### Object",
  "",
  "Say world.",
  "",
  "### Polite Greeting",
  "",
  "Say hello politely and keep the tone warm.",
  "",
  "### Absolute Briefing",
  "",
  "This flow composes other flows through dotted import paths.",
  "",
  "#### Opening",
  "",
  "State the topic.",
  "",
  "#### Closing",
  "",
  "End with one clear next step.",
  "",
  "### Shared Chain",
  "",
  "This flow chains one imported step into shared follow-through.",
  "",
  "#### Leaf Step",
  "",
  "This flow reuses shared context through one imported step.",
  "",
  "##### Shared Context",
  "",
  "Start with the shared context.",
  "",
  "#### Shared Wrap-Up",
  "",
  "Finish with a shared wrap-up.",
  "",
  "### Deep Chain",
  "",
  "This flow composes a deep dotted import path without relative syntax.",
  "",
  "#### Deep Detail",
  "",
  "This flow reaches shared topic context through another imported flow.",
  "",
  "##### Root Topic",
  "",
  "Name the root topic once.",
  "",
  "#### Final Note",
  "",
  "End with the final shared note.",
]

[[cases]]
name = "missing imported module fails in compile stage"
status = "active"
kind = "compile_fail"
prompt = "prompts/invalid_missing_module/AGENTS.prompt"
agent = "MissingModuleDemo"
exception_type = "CompileError"
error_code = "E280"
location_line = 2

[[cases]]
name = "unresolved qualified symbol fails in compile stage"
status = "active"
kind = "compile_fail"
prompt = "prompts/invalid_unresolved_symbol/AGENTS.prompt"
agent = "UnresolvedImportedSymbolDemo"
exception_type = "CompileError"
error_code = "E281"
location_line = 10

[[cases]]
name = "duplicate declaration name in one imported module fails in compile stage"
status = "active"
kind = "compile_fail"
prompt = "prompts/invalid_duplicate_declaration/AGENTS.prompt"
agent = "DuplicateDeclarationDemo"
exception_type = "CompileError"
error_code = "E288"
location_path = "prompts/invalid_duplicates/duplicate_names/AGENTS.prompt"
location_line = 5
related = [
    { label = "first declaration", path = "prompts/invalid_duplicates/duplicate_names/AGENTS.prompt", line = 1 },
]

[[cases]]
name = "imported parse failure shows the imported module trace"
status = "active"
kind = "compile_fail"
prompt = "prompts/invalid_imported_parse/AGENTS.prompt"
agent = "ImportedParseFailureDemo"
exception_type = "ParseError"
error_code = "E101"
location_path = "prompts/broken/syntax/AGENTS.prompt"
location_line = 2

