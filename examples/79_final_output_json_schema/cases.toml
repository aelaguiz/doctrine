schema_version = 1
default_prompt = "prompts/AGENTS.prompt"

[[cases]]
name = "json-schema final output renders structured metadata and payload preview"
status = "active"
kind = "render_contract"
agent = "RepoStatusAgent"
approx_ref = "ref/repo_status_agent_AGENTS.md"
assertion = "exact_lines"
expected_lines = [
  "Report repo status in structured form.",
  "",
  "## Summarize",
  "",
  "Summarize the repo state and end with the declared final output.",
  "",
  "## Final Output",
  "",
  "### Repo Status Final Response",
  "",
  "> **Final answer contract**",
  "> End the turn with one schema-backed final assistant message.",
  "",
  "| Contract | Value |",
  "| --- | --- |",
  "| Message kind | Final assistant message |",
  "| Format | Structured JSON |",
  "| Shape | Repo Status JSON |",
  "| Schema | Repo Status Schema |",
  "| Profile | OpenAIStructuredOutput |",
  "| Schema file | `schemas/repo_status.schema.json` |",
  "| Example file | `examples/repo_status.example.json` |",
  "| Requirement | Required |",
  "",
  "#### Payload Shape",
  "",
  "| Field | Type | Meaning |",
  "| --- | --- | --- |",
  "| `summary` | string | Short natural-language status. |",
  "| `status` | string | Current repo outcome. |",
  "| `next_step` | string \\| null | Null only when no follow-up is needed. |",
  "",
  "#### Example Shape",
  "",
  "```json",
  "{",
  "  \"summary\": \"Branch is clean and checks passed.\",",
  "  \"status\": \"ok\",",
  "  \"next_step\": null",
  "}",
  "```",
  "",
  "#### Field Notes",
  "",
  "Use the schema fields exactly once.",
  "Keep `summary` short and user-facing.",
  "",
  "#### Read It Cold",
  "",
  "The final answer should stand on its own as one structured repo-status result.",
]

[[cases]]
name = "json-schema final output builds the canonical emitted contract tree"
status = "active"
kind = "build_contract"
build_target = "example_79_final_output_json_schema"

[[cases]]
name = "json-schema final output fails loud when the declared schema file is missing"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_MISSING_SCHEMA_FILE.prompt"
agent = "InvalidMissingSchemaFileAgent"
exception_type = "CompileError"
error_code = "E215"
message_contains = [
  "Final output support file is missing or unreadable",
  "json schema RepoStatusSchema",
  "schemas/missing_repo_status.schema.json",
]

[[cases]]
name = "json-schema final output fails loud when the declared schema file is invalid JSON"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_INVALID_SCHEMA_JSON.prompt"
agent = "InvalidInvalidSchemaJsonAgent"
exception_type = "CompileError"
error_code = "E216"
message_contains = [
  "Final output schema file must contain a JSON object",
  "json schema RepoStatusSchema",
  "schemas/invalid_repo_status.schema.json",
]

[[cases]]
name = "json-schema final output fails loud when the declared example file is missing"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_MISSING_EXAMPLE_FILE.prompt"
agent = "InvalidMissingExampleFileAgent"
exception_type = "CompileError"
error_code = "E215"
message_contains = [
  "Final output support file is missing or unreadable",
  "output shape RepoStatusJson",
  "examples/missing_repo_status.example.json",
]
