[[cases]]
name = "via review.on_accept.route on an on_reject-resolved next_owner fails loud"
status = "active"
kind = "compile_fail"
prompt = "prompts/invalid_via_section_mismatch/AGENTS.prompt"
agent = "InvalidViaSectionMismatchDemo"
exception_type = "CompileError"
error_code = "E317"
location_path = "prompts/invalid_via_section_mismatch/AGENTS.prompt"
location_line = 79

[[cases]]
name = "shared review carrier without via and without interpolation still fails loud"
status = "active"
kind = "compile_fail"
prompt = "prompts/invalid_missing_via_and_interpolation/AGENTS.prompt"
agent = "InvalidMissingViaAndInterpolationDemo"
exception_type = "CompileError"
error_code = "E496"
location_path = "prompts/invalid_missing_via_and_interpolation/AGENTS.prompt"
location_line = 78

[[cases]]
name = "via review.<section>.route outside a next_owner field fails loud"
