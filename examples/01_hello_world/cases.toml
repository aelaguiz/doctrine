schema_version = 1
default_prompt = "prompts/AGENTS.prompt"

[[cases]]
name = "hello world scalar role renders opening prose"
status = "active"
kind = "render_contract"
agent = "HelloWorld"
assertion = "exact_lines"
approx_ref = "ref/AGENTS.md"
expected_lines = [
  "You are the hello world agent.",
  "",
  "## Instruction",
  "",
  "Say hello world.",
]

[[cases]]
name = "hello world headed role renders headed opening section"
status = "active"
kind = "render_contract"
agent = "HelloWorld2"
assertion = "exact_lines"
expected_lines = [
  "## Role",
  "",
  "You are the hello world agent.",
  "",
  "## Instruction",
  "",
  "Say hello world.",
]

[[cases]]
name = "missing agent colon fails in parse stage"
status = "active"
kind = "parse_fail"
prompt = "prompts/invalid_parse_missing_colon/AGENTS.prompt"
exception_type = "ParseError"
error_code = "E101"
message_contains = [
  "Expected one of",
  "COLON",
]

[[cases]]
name = "reordered fields fail in compile stage"
status = "active"
kind = "compile_fail"
prompt = "prompts/invalid_compile_reordered/AGENTS.prompt"
agent = "ReorderedFields"
exception_type = "CompileError"
error_code = "E206"
location_line = 5

[[cases]]
name = "invalid string literal fails in parse stage"
status = "active"
kind = "parse_fail"
prompt = "prompts/invalid_string_literal/AGENTS.prompt"
exception_type = "ParseError"
error_code = "E106"
message_contains = [
  "Invalid string literal",
  "truncated \\xXX escape",
]
