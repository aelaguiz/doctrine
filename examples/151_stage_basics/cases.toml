schema_version = 1
default_prompt = "prompts/AGENTS.prompt"

[[cases]]
name = "stage validation passes for a fully typed stage with owner, support, applies_to, lane, inputs, and emits"
status = "active"
kind = "render_contract"
agent = "StagePlanDemo"
assertion = "exact_lines"
expected_lines = [
  "Read the lesson plan stage contract.",
]

[[cases]]
name = "stage owner that does not resolve to a top-level skill fails with E546"
status = "active"
kind = "compile_fail"
prompt = "prompts/invalid_unknown_owner/AGENTS.prompt"
agent = "StagePlanDemo"
exception_type = "CompileError"
error_code = "E546"

[[cases]]
name = "stage support that does not resolve to a top-level skill fails with E547"
status = "active"
kind = "compile_fail"
prompt = "prompts/invalid_unknown_support/AGENTS.prompt"
