  "",
  "#### Opening",
  "",
  "State the situation.",
  "",
  "#### Context Note",
  "",
  "Add one sentence of missing context before the main point.",
  "",
  "#### Main Point",
  "",
  "Give the revised main point directly.",
  "",
  "#### Closing",
  "",
  "End with the next step.",
]

