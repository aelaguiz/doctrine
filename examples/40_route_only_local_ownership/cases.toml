schema_version = 1
default_prompt = "prompts/AGENTS.prompt"

[[cases]]
name = "route-only turns can stop locally without a semantic route"
status = "active"
kind = "render_contract"
agent = "RouteOnlyLocalOwnershipDemo"
assertion = "exact_lines"
approx_ref = "ref/route_only_local_ownership_demo/AGENTS.md"
expected_lines = [
