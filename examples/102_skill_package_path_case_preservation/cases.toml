schema_version = 1
default_prompt = "prompts/SKILL.prompt"

[[cases]]
name = "path and case preserving companions emit exactly"
status = "active"
kind = "build_contract"
build_target = "example_102_skill_package_path_case_preservation"

[[cases]]
name = "companion path case collisions fail loud"
status = "active"
kind = "compile_fail"
prompt = "prompts/invalid/SKILL.prompt"
exception_type = "CompileError"
error_code = "E304"
location_path = "prompts/invalid/skill.md"

[[cases]]
name = "bundled files may not collide with compiled agent markdown outputs"
status = "active"
kind = "compile_fail"
prompt = "prompts/invalid_agent_output_collision/SKILL.prompt"
exception_type = "CompileError"
error_code = "E304"
location_path = "prompts/invalid_agent_output_collision/agents/reviewer.md"
related = [
    { label = "first bundled source", path = "prompts/invalid_agent_output_collision/agents/reviewer.prompt" },
]
