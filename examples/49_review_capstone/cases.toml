schema_version = 1
default_prompt = "prompts/AGENTS.prompt"

[[cases]]
name = "review capstone keeps blocked review, current truth, and carried state coherent"
status = "active"
kind = "render_contract"
agent = "CapstoneReviewDemo"
assertion = "exact_lines"
expected_lines = [
  "Keep the full review bundle coherent, explicit, and durable.",
  "",
  "## Capstone Review",
  "",
  "Review subjects: Draft Spec, and Metadata Record.",
  "Shared review contract: Capstone Review Contract.",
  "",
  "### Start Review",
  "",
  "Block: Producer handoff is incomplete.",
  "",
  "Block: Current review mode is implicit.",
  "",
  "Reject: Handoff Truth.",
  "",
  "Reject: Producer handoff named an artifact outside this review family.",
  "",
  "### Evidence Checks",
  "",
  "Accepted Peer Set is comparison-only support.",
  "",
  "When ReviewState.metadata_refresh_active, ignore `MetadataRecord.previous_summary` for rewrite evidence.",
  "",
  "Preserve exact `ApprovedBoundary.exact_scope_boundary`.",
  "",
  "Reject: Clarity.",
  "",
  "Accept only if The shared capstone review contract passes.",
  "",
  "### If Accepted",
  "",
  "Match ReviewState.active_mode:",
  "If draft-rewrite:",
  "- Current artifact: Draft Spec.",
  "- Carry active mode: draft-rewrite.",
  "- Carry trigger reason: structure-gap.",
  "- Accepted draft rewrite returns to DraftAuthor.",
  "If metadata-refresh:",
  "- Current artifact: Metadata Record.",
  "- Carry active mode: metadata-refresh.",
  "- Carry trigger reason: stale-metadata.",
  "- Accepted metadata refresh returns to MetadataAuthor.",
  "",
  "### If Rejected",
  "",
  "Match ReviewState.active_mode:",
  "If draft-rewrite when ProducerHandoff.invalid:",
  "- There is no current artifact for this outcome.",
  "- Blocked handoff review returns to ReviewLead.",
  "If draft-rewrite:",
  "- Current artifact: Draft Spec.",
  "- Carry active mode: draft-rewrite.",
  "- Carry trigger reason: structure-gap.",
  "- Rejected draft rewrite returns to DraftAuthor.",
  "If metadata-refresh when ProducerHandoff.invalid:",
  "- There is no current artifact for this outcome.",
  "- Blocked handoff review returns to ReviewLead.",
  "If metadata-refresh:",
  "- Current artifact: Metadata Record.",
  "- Carry active mode: metadata-refresh.",
  "- Carry trigger reason: stale-metadata.",
  "- Rejected metadata refresh returns to MetadataAuthor.",
  "Else:",
  "- There is no current artifact for this outcome.",
  "- Blocked mode selection review returns to ReviewLead.",
  "",
  "## Inputs",
  "",
  "### Producer Handoff",
  "",
  "- Source: Prompt",
  "- Shape: Json Object",
  "- Requirement: Required",
  "",
  "Use the producer handoff that says whether the handoff is complete and whether it named the wrong current artifact.",
  "",
  "### Review State",
  "",
  "- Source: Prompt",
  "- Shape: Json Object",
  "- Requirement: Required",
  "",
  "Use the review state that says which mode is active, whether peer comparison was used, whether the current artifact fell outside this review family, whether metadata-refresh exclusions apply, whether scope leaked, and why the next owner must act.",
  "",
  "### Draft Spec",
  "",
  "- Source: File",
  "- Path: `unit_root/DRAFT_SPEC.md`",
  "- Shape: Markdown Document",
  "- Requirement: Required",
  "",
  "Use the current draft specification when the active mode is draft rewrite.",
  "",
  "### Metadata Record",
  "",
  "- Source: File",
  "- Path: `unit_root/METADATA.json`",
  "- Shape: Json Object",
  "- Requirement: Required",
  "",
  "Use the current metadata record when the active mode is metadata refresh.",
  "",
  "### Approved Boundary",
  "",
  "- Source: Prompt",
  "- Shape: Json Object",
  "- Requirement: Required",
  "",
  "Use the approved boundary facts that define the exact scope the review must preserve.",
  "",
  "### Accepted Peer Set",
  "",
  "- Source: File",
  "- Path: `catalog/accepted_peers.json`",
  "- Shape: Json Object",
  "- Requirement: Advisory",
  "",
  "Use accepted peer examples only for comparison when the review state says peer comparison was used.",
  "",
  "## Outputs",
  "",
  "### Capstone Review Comment",
  "",
  "- Target: Turn Response",
  "- Shape: Comment",
  "- Requirement: Required",
  "",
  "#### Verdict",
  "",
  "Say whether the review accepted the selected subject or requested changes.",
  "",
  "#### Reviewed Artifact",
  "",
  "Name the exact artifact identity this review judged. If the handoff-first block stopped review before content review started, name the producer handoff instead.",
  "",
  "#### Analysis Performed",
  "",
  "Summarize the review analysis that led to the verdict, including how Reviewed Artifact did or did not satisfy Clarity, plus any preserved boundary, comparison-only help, and rewrite-evidence exclusions that mattered.",
  "",
  "#### Output Contents That Matter",
  "",
  "Summarize the exact contents the next owner must read first, including any preserved boundary or rewrite-only exclusions that still matter now.",
  "",
  "#### Current Artifact",
  "",
  "Rendered only when present(current_artifact).",
  "",
  "Name the artifact that remains current after this review outcome. Blocked handoff-first outcomes keep this absent because no later artifact became current.",
  "",
  "#### Next Owner",
  "",
  "Name the next owner, including ReviewLead for blocked or unresolved review, DraftAuthor for draft work, and MetadataAuthor for metadata work.",
  "",
  "#### Active Mode",
  "",
  "Rendered only when present(active_mode).",
  "",
  "Name the active review mode that selected the current artifact.",
  "",
  "#### Trigger Reason",
  "",
  "Rendered only when present(trigger_reason).",
  "",
  "Name the trigger reason that explains why this mode and artifact are live.",
  "",
  "#### Failure Detail",
  "",
  "Rendered only when verdict is changes requested.",
  "",
  "##### Failing Gates",
  "",
  "Name every failing review gate in authored order, including exact shared-contract gate identities.",
  "",
  "##### Blocked Gate",
  "",
  "Rendered only when present(blocked_gate).",
  "",
  "Name the first blocking gate when the review stopped before content review started.",
  "",
  "#### Trust Surface",
  "",
  "- Current Artifact when present(current_artifact)",
  "- Active Mode when present(active_mode)",
  "- Trigger Reason when present(trigger_reason)",
  "",
  "#### Standalone Read",
  "",
  "A downstream owner should be able to read this comment alone and understand whether review was blocked or completed, what was actually reviewed, what remains current now when something remains current, what mode and trigger reason are live, who owns next, and which exact failures still matter.",
]

[[cases]]
name = "review capstone rejects mixed current-none and current-artifact branches"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_CURRENT_NONE_AND_CURRENT_ARTIFACT.prompt"
agent = "InvalidCurrentNoneAndCurrentArtifactDemo"
exception_type = "CompileError"
error_code = "E486"
message_contains = [
  "Review outcome resolves more than one currentness result",
  "on_reject",
]

[[cases]]
name = "review capstone keeps block statements out of outcome sections"
status = "active"
kind = "parse_fail"
prompt = "prompts/INVALID_BLOCK_INSIDE_ON_ACCEPT.prompt"
exception_type = "ParseError"
error_code = "E471"
message_contains = [
  "Illegal statement placement",
  "review body",
]

[[cases]]
name = "review capstone keeps emitted output fields out of output guards"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_GUARD_READS_OUTPUT_FIELD.prompt"
agent = "InvalidGuardReadsOutputFieldDemo"
exception_type = "CompileError"
error_code = "E338"
message_contains = [
  "Output guard reads disallowed source",
  "BrokenCapstoneReviewComment.next_owner",
]
