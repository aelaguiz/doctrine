schema_version = 1
default_prompt = "prompts/AGENTS.prompt"

[[cases]]
name = "review contracts can target schemas with exported gates"
status = "active"
kind = "render_contract"
agent = "SchemaReviewContractDemo"
assertion = "exact_lines"
approx_ref = "ref/schema_review_contract_demo/AGENTS.md"
expected_lines = [
  "Keep schema-backed review verdicts and routes aligned.",
  "",
  "## Schema Backed Plan Review",
  "",
  "Review subject: Draft Plan.",
  "Shared review contract: Plan Review Contract.",
  "",
  "### Contract Gate Checks",
  "",
  "Reject: Outline Complete.",
  "",
  "Reject: Evidence Grounded.",
  "",
  "Accept only if The schema review contract passes.",
  "",
  "### If Accepted",
  "",
  "No artifact is current for this outcome.",
  "",
  "Accepted plan goes to ReviewLead.",
  "",
  "### If Rejected",
  "",
  "No artifact is current for this outcome.",
  "",
  "Rejected plan goes to PlanAuthor.",
  "",
  "## Inputs",
  "",
  "### Draft Plan",
  "",
  "- Source: File",
  "- Path: `unit_root/DRAFT_PLAN.md`",
  "- Shape: Markdown Document",
  "- Requirement: Required",
  "",
  "- Outline Missing: `Outline Missing`",
  "- Evidence Missing: `Evidence Missing`",
  "",
  "## Outputs",
  "",
  "### Plan Review Comment",
  "",
  "| Contract | Value |",
  "| --- | --- |",
  "| Target | Turn Response |",
  "| Shape | Comment |",
  "| Requirement | Required |",
  "",
  "#### Verdict",
  "",
  "State the review verdict.",
  "",
  "#### Reviewed Artifact",
  "",
  "Name the reviewed artifact.",
  "",
  "#### Analysis Performed",
  "",
  "Summarize the review analysis.",
  "",
  "#### Output Contents That Matter",
  "",
  "State what the next owner should read first.",
  "",
  "#### Next Owner",
  "",
  "Name ReviewLead when accepted and PlanAuthor when rejected.",
  "",
  "#### Failure Detail",
  "",
  "Show this only when verdict is changes requested.",
  "",
  "##### Failing Gates",
  "",
  "List exact failing gates, including Outline Complete and Evidence Grounded when they fail.",
]

[[cases]]
name = "schema review contracts must export at least one gate"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_SCHEMA_CONTRACT_WITHOUT_GATES.prompt"
agent = "InvalidGateLessReviewDemo"
exception_type = "CompileError"
error_code = "E477"
message_contains = [
  "Review contract `GateLessContract`",
  "must export at least one gate",
]
