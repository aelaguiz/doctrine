schema_version = 1
default_prompt = "prompts/AGENTS.prompt"

[[cases]]
name = "split handoff and final_output may consume the same shared route semantics"
status = "active"
kind = "render_contract"
agent = "ReviewSplitRouteFinalOutputDemo"
approx_ref = "ref/review_split_route_final_output_demo/AGENTS.md"
assertion = "exact_lines"
expected_lines = [
  "Emit the review comment and end with a route-aware JSON control result.",
  "",
  "## Acceptance Review",
  "",
  "Review subject: Draft Plan.",
  "Shared review contract: Plan Review Contract.",
  "",
  "### Contract Checks",
  "",
  "Accept only if The acceptance review contract passes.",
  "",
  "### If Accepted",
  "",
  "Current artifact: Draft Plan.",
  "",
  "Accepted plan goes to ReviewLead.",
  "",
  "### If Rejected",
  "",
  "Current artifact: Draft Plan.",
  "",
  "Rejected plan goes to PlanAuthor.",
  "",
  "## Inputs",
  "",
  "### Draft Plan",
  "",
  "- Source: File",
  "- Path: `unit_root/DRAFT_PLAN.md`",
  "- Shape: Markdown Document",
  "- Requirement: Required",
  "",
  "## Outputs",
  "",
  "### Acceptance Review Comment",
  "",
  "- Target: Turn Response",
  "- Shape: Comment",
  "- Requirement: Required",
  "",
  "- Verdict: State whether the plan passed review.",
  "- Reviewed Artifact: Name the reviewed artifact.",
  "- Analysis Performed: Summarize the review analysis.",
  "- Output Contents That Matter: Summarize what the next owner should read first.",
  "- Current Artifact: Name the artifact that remains current after review.",
  "- Next Owner: Name ReviewLead when accepted and PlanAuthor when rejected.",
  "",
  "#### Failure Detail",
  "",
  "Show this only when verdict is changes requested.",
  "",
  "##### Failing Gates",
  "",
  "List exact failing gates, including Outline Complete when it fails.",
  "",
  "#### Trust Surface",
  "",
  "- `Current Artifact`",
  "",
  "- Standalone Read: From this output alone, a downstream owner should know the acceptance verdict, current artifact, and next owner.",
  "",
  "## Final Output",
  "",
  "### Acceptance Control Final Response",
  "",
  "> **Final answer contract**",
  "> End the turn with one final assistant message that follows this schema.",
  "",
  "| Contract | Value |",
  "| --- | --- |",
  "| Message type | Final assistant message |",
  "| Format | Structured JSON |",
  "| Shape | Acceptance Control JSON |",
  "| Schema | Acceptance Control Schema |",
  "| Profile | OpenAIStructuredOutput |",
  "| Generated Schema | `schemas/acceptance_control_final_response.schema.json` |",
  "| Requirement | Required |",
  "",
  "#### Payload Fields",
  "",
  "| Field | Type | Required On Wire | Null Allowed | Meaning |",
  "| --- | --- | --- | --- | --- |",
  "| `route` | string | Yes | No | Control route for the next owner. One of `follow_up`, `revise`. |",
  "| `current_artifact` | string | Yes | No | Current artifact after review. |",
  "| `next_owner` | string | Yes | No | Next owner after review. |",
  "",
  "#### Example",
  "",
  "```json",
  "{",
  "  \"route\": \"follow_up\",",
  "  \"current_artifact\": \"Draft Plan\",",
  "  \"next_owner\": \"ReviewLead\"",
  "}",
  "```",
  "",
  "This final response is separate from the review carrier: AcceptanceReviewComment.",
  "Read the review carrier for the full review outcome.",
  "- Kind: Json Object",
  "",
  "#### Accepted Route",
  "",
  "Show this only when verdict is accepted and a routed owner exists.",
  "",
  "Accepted plan goes to ReviewLead. Next owner: Review Lead.",
  "",
  "#### Retry Route",
  "",
  "Show this only when verdict is changes requested and a routed owner exists.",
  "",
  "PlanAuthor",
  "",
  "#### Read on Its Own",
  "",
  "This final JSON should be enough for the next owner to route the review result.",
]
