schema_version = 1
default_prompt = "prompts/AGENTS.prompt"

[[cases]]
name = "smallest prose final output renders as a dedicated final-answer contract"
status = "active"
kind = "render_contract"
agent = "HelloAgent"
approx_ref = "ref/hello_agent_AGENTS.md"
assertion = "exact_lines"
expected_lines = [
  "Answer plainly and end the turn.",
  "",
  "## Reply",
  "",
  "Reply and stop.",
  "",
  "## Final Output",
  "",
  "### Final Reply",
  "",
  "> **Final answer contract**",
  "> End the turn with one final assistant message that follows this contract.",
  "",
  "| Contract | Value |",
  "| --- | --- |",
  "| Message type | Final assistant message |",
  "| Format | Natural-language markdown |",
  "| Shape | Comment Text |",
  "| Requirement | Required |",
  "",
  "#### Expected Structure",
  "",
  "Lead with the shipped outcome.",
  "Keep the answer concise unless the user asked for depth.",
  "",
  "#### Read on Its Own",
  "",
  "The user should understand what changed and what happens next.",
]
