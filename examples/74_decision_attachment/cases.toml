schema_version = 1
default_prompt = "prompts/AGENTS.prompt"

[[cases]]
name = "agent decision attachment renders candidate and ranking obligations naturally"
status = "active"
kind = "render_contract"
agent = "StrategyDecisionDemo"
assertion = "exact_lines"
expected_lines = [
  "Follow Playable Strategy Choice before you lock the route.",
  "",
  "## Choose",
  "",
  "Use the attached decision scaffold before you freeze the strategy.",
  "",
  "## Playable Strategy Choice",
  "",
  "Build at least 3 candidates before choosing a winner.",
  "You must rank the candidates.",
  "You must name clear rejects.",
  "Choose exactly one winner.",
  "Rank by Teaching Fit, Product Reality, Capstone Coherence, and Downstream Preservability.",
]

[[cases]]
name = "decision attachment renders candidate-pool evidence requirements naturally"
status = "active"
kind = "render_contract"
agent = "RepDecisionDemo"
assertion = "exact_lines"
expected_lines = [
  "Follow Rep Choice before you lock the reps.",
  "",
  "## Choose",
  "",
  "Use the attached decision scaffold before you freeze the reps.",
  "",
  "## Rep Choice",
  "",
  "You must show the candidate pool.",
  "You must show the kept candidates.",
  "You must show the rejected candidates.",
  "You must show the sequencing proof.",
  "You must explain why the winner won.",
]

[[cases]]
name = "decision field fails loudly on an unknown declaration"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_UNKNOWN_DECISION_REF.prompt"
agent = "InvalidUnknownDecisionRef"
exception_type = "CompileError"
message_contains = [
  "decision declaration",
  "MissingDecision",
]

[[cases]]
name = "multiple decision attachments render both decision scaffolds in order"
status = "active"
kind = "render_contract"
agent = "MultiDecisionDemo"
assertion = "exact_lines"
expected_lines = [
  "Follow Playable Strategy Choice and Rep Choice before you lock the plan.",
  "",
  "## Choose",
  "",
  "Use both attached decision scaffolds before you freeze the route and reps.",
  "",
  "## Playable Strategy Choice",
  "",
  "Build at least 3 candidates before choosing a winner.",
  "You must rank the candidates.",
  "You must name clear rejects.",
  "Choose exactly one winner.",
  "Rank by Teaching Fit, Product Reality, Capstone Coherence, and Downstream Preservability.",
  "",
  "## Rep Choice",
  "",
  "You must show the candidate pool.",
  "You must show the kept candidates.",
  "You must show the rejected candidates.",
  "You must show the sequencing proof.",
  "You must explain why the winner won.",
]

[[cases]]
name = "duplicate decision attachments still fail loudly"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_DUPLICATE_DECISION_REF.prompt"
agent = "InvalidDuplicateDecisionRefDemo"
exception_type = "CompileError"
error_code = "E204"
message_contains = [
  "Duplicate typed field",
  "decision:PlayableStrategyChoice",
]
