  "| **Inline HTML** | HTML Block | See the detail below. |",
  "| **References** | Footnotes | See the detail below. |",
  "| **Evidence** | Image | See the detail below. |",
  "| **Follow-Up Matrix** | Table | Use the columns `Summary` and `Details`. |",
