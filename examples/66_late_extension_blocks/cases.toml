[[cases]]
name = "raw markdown blocks require multiline text"
status = "active"
kind = "compile_fail"
prompt = "prompts/invalid_markdown_inline_text/AGENTS.prompt"
agent = "InvalidMarkdownInlineTextDemo"
exception_type = "CompileError"
error_code = "E297"
location_line = 3

[[cases]]
name = "inline table cells reject multiline text"
status = "active"
kind = "compile_fail"
prompt = "prompts/invalid_table_inline_multiline_cell/AGENTS.prompt"
agent = "InvalidTableInlineMultilineCellDemo"
exception_type = "CompileError"
error_code = "E297"
location_line = 9
