schema_version = 1
default_prompt = "prompts/AGENTS.prompt"

[[cases]]
name = "omitted io wrapper titles reuse direct declaration titles"
status = "active"
kind = "render_contract"
agent = "OmittedIoWrapperTitlesDemo"
assertion = "exact_lines"
expected_lines = [
  "Reuse direct declaration titles when IO wrapper titles are omitted.",
  "",
  "## Your Inputs",
  "",
  "### Lessons Issue Ledger",
  "",
  "Use this ledger to track repeated section issues.",
  "",
  "#### Lessons Issue Ledger",
  "",
  "- Source: File",
  "- Path: `catalog/lessons_issue_ledger.json`",
  "- Shape: JSON Document",
  "- Requirement: Required",
  "",
  "## Your Outputs",
  "",
  "### Section Handoff",
  "",
  "#### Section Handoff",
  "",
  "| Contract | Value |",
  "| --- | --- |",
  "| Target | Turn Response |",
  "| Shape | Comment |",
  "| Requirement | Required |",
]

[[cases]]
name = "explicit and omitted io wrapper titles render the same"
status = "active"
kind = "render_contract"
prompt = "prompts/EXPLICIT.prompt"
agent = "ExplicitIoWrapperTitlesDemo"
assertion = "exact_lines"
expected_lines = [
  "Reuse direct declaration titles when IO wrapper titles are authored explicitly.",
  "",
  "## Your Inputs",
  "",
  "### Lessons Issue Ledger",
  "",
  "Use this ledger to track repeated section issues.",
  "",
  "#### Lessons Issue Ledger",
  "",
  "- Source: File",
  "- Path: `catalog/lessons_issue_ledger.json`",
  "- Shape: JSON Document",
  "- Requirement: Required",
  "",
  "## Your Outputs",
  "",
  "### Section Handoff",
  "",
  "#### Section Handoff",
  "",
  "| Contract | Value |",
  "| --- | --- |",
  "| Target | Turn Response |",
  "| Shape | Comment |",
  "| Requirement | Required |",
]

[[cases]]
name = "omitted io wrapper title with multiple direct refs fails loud"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_MULTIPLE_DIRECT_REFS.prompt"
agent = "InvalidMultipleDirectRefsIoWrapperDemo"
exception_type = "CompileError"
message_contains = [
  "Omitted title in inputs section `issue_ledger` requires exactly one direct declaration title source",
]

[[cases]]
name = "omitted io wrapper title with keyed children fails loud"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_KEYED_CHILD.prompt"
agent = "InvalidKeyedChildIoWrapperDemo"
exception_type = "CompileError"
message_contains = [
  "Omitted title in inputs section `issue_ledger` requires exactly one direct declaration title source",
]
