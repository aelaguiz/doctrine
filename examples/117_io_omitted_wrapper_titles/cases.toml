schema_version = 1
default_prompt = "prompts/AGENTS.prompt"

[[cases]]
name = "omitted io wrapper titles lower one direct declaration"
status = "active"
kind = "render_contract"
agent = "OmittedIoWrapperTitlesDemo"
assertion = "exact_lines"
expected_lines = [
  "Lower omitted IO wrapper titles into one child-owned heading.",
  "",
  "## Your Inputs",
  "",
  "### Lessons Issue Ledger",
  "",
  "- Source: File",
  "- Path: `catalog/lessons_issue_ledger.json`",
  "- Shape: JSON Document",
  "- Requirement: Required",
  "",
  "Use this ledger to track repeated section issues.",
  "Keep the ledger current after each section pass.",
  "",
  "## Your Outputs",
  "",
  "### Section Handoff",
  "",
  "- Target: Turn Response",
  "- Shape: Comment",
  "- Requirement: Required",
]

[[cases]]
name = "explicit io wrapper titles keep long-form nesting"
status = "active"
