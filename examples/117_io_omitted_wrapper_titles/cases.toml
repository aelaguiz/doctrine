assertion = "exact_lines"
expected_lines = [
  "Keep explicit IO wrapper titles as the long form.",
  "",
  "## Your Inputs",
  "",
  "### Lessons Issue Ledger",
  "",
  "Use this ledger to track repeated section issues.",
  "",
  "#### Lessons Issue Ledger",
  "",
  "- Source: File",
  "- Path: `catalog/lessons_issue_ledger.json`",
  "- Shape: JSON Document",
  "- Requirement: Required",
  "",
  "## Your Outputs",
  "",
  "### Section Handoff",
  "",
  "#### Section Handoff",
  "",
  "- Target: Turn Response",
  "- Shape: Comment",
  "- Requirement: Required",
]

[[cases]]
name = "omitted io wrapper title with multiple direct refs fails loud"
status = "active"
kind = "compile_fail"
prompt = "prompts/invalid_multiple_direct_refs/AGENTS.prompt"
agent = "InvalidMultipleDirectRefsIoWrapperDemo"
exception_type = "CompileError"
error_code = "E299"
location_line = 16
related = [
    { label = "direct `Lessons Issue Ledger` declaration", line = 17 },
    { label = "direct `Forward Issue Ledger` declaration", line = 18 },
]

[[cases]]
name = "omitted io wrapper title with keyed children fails loud"
