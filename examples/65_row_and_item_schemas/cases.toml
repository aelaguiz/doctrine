schema_version = 1
default_prompt = "prompts/AGENTS.prompt"

[[cases]]
name = "item_schema and row_schema descendants stay addressable on readable blocks"
status = "active"
kind = "render_contract"
agent = "LessonPlanDemo"
assertion = "exact_lines"
expected_lines = [
  "Keep Step Label, Topic, and Coaching Level aligned in Lesson Plan.",
  "",
  "## Plan",
  "",
  "Write the lesson plan.",
  "",
  "## Outputs",
  "",
  "### Lesson Plan File",
  "",
  "| Contract | Value |",
  "| --- | --- |",
  "| Target | File |",
  "| Path | `lesson_root/LESSON_PLAN.md` |",
  "| Shape | Markdown Document |",
  "| Requirement | Required |",
  "| Structure | Lesson Plan |",
  "",
  "#### Artifact Structure",
  "",
  "This artifact must follow the `Lesson Plan` structure below.",
  "",
  "| Required Section | Kind | What it must do |",
  "| --- | --- | --- |",
  "| **Read Order** | Ordered List | Read the learner goal. Check the coaching move. |",
  "| **Step Arc** | Table | Use the columns `Coaching Level` and `Evidence`. |",
  "",
  "##### Read Order",
  "",
  "_Advisory_",
  "",
  "1. Read the learner goal.",
  "2. Check the coaching move.",
  "",
  "##### Step Arc Contract",
  "",
  "_Required \u00b7 table_",
  "",
  "| Coaching Level | Evidence |",
  "| --- | --- |",
  "| High | The goal is restated in plain language. |",
]

[[cases]]
name = "item_schema keys stay unique"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_DUPLICATE_ITEM_SCHEMA_KEY.prompt"
agent = "InvalidDuplicateItemSchemaKeyDemo"
exception_type = "CompileError"
error_code = "E295"
message_contains = [
  "Duplicate item_schema key",
  "step_label",
]

[[cases]]
name = "row_schema keys stay unique"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_DUPLICATE_ROW_SCHEMA_KEY.prompt"
agent = "InvalidDuplicateRowSchemaKeyDemo"
exception_type = "CompileError"
error_code = "E295"
message_contains = [
  "Duplicate row_schema key",
  "topic",
]

[[cases]]
name = "readable lists reject repeated item_schema blocks"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_DUPLICATE_ITEM_SCHEMA_BLOCK.prompt"
agent = "InvalidDuplicateItemSchemaBlockDemo"
exception_type = "ParseError"
error_code = "E199"
message_contains = [
  "Readable list bodies may define `item_schema:` only once.",
]

[[cases]]
name = "readable tables reject repeated row_schema blocks"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_DUPLICATE_ROW_SCHEMA_BLOCK.prompt"
agent = "InvalidDuplicateRowSchemaBlockDemo"
exception_type = "ParseError"
error_code = "E199"
message_contains = [
  "Readable table bodies may define `row_schema:` only once.",
]
