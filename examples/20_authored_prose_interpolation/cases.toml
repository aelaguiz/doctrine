[[cases]]
name = "workflow refs stay rejected in skill purpose interpolation"
status = "active"
kind = "compile_fail"
prompt = "prompts/invalid_skill_purpose_workflow_ref/AGENTS.prompt"
agent = "InvalidSkillPurposeInterpolationDemo"
exception_type = "CompileError"
error_code = "E271"
location_path = "prompts/invalid_skill_purpose_workflow_ref/AGENTS.prompt"

