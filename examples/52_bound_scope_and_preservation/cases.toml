schema_version = 1
default_prompt = "prompts/AGENTS.prompt"

[[cases]]
name = "bound roots keep owned scope and preserved truth coherent"
status = "active"
kind = "render_contract"
agent = "BoundScopeAndPreservationDemo"
assertion = "exact_lines"
approx_ref = "ref/bound_scope_and_preservation_demo/AGENTS.md"
expected_lines = [
  "Keep narrow ownership and preserved truth coherent through named bindings.",
  "",
  "## Bound Scope And Preservation",
  "",
  "Keep narrow ownership and preserved upstream truth attached to named bindings.",
  "",
  "The current artifact is Section Metadata.",
  "",
  "Only edit `section_metadata.name` and `section_metadata.description`.",
  "",
  "Keep `section_metadata.*` unchanged except `section_metadata.name` and `section_metadata.description`.",
  "",
  "Preserve structure `approved_boundary`.",
  "",
  "## Inputs",
  "",
  "### Section Metadata",
  "",
  "- Source: File",
  "- Path: `unit_root/_authoring/section_metadata.json`",
  "- Shape: Json Object",
  "- Requirement: Required",
  "",
  "### Approved Boundary",
  "",
  "- Source: Prompt",
  "- Shape: Json Object",
  "- Requirement: Required",
  "",
  "## Outputs",
  "",
  "### Coordination Handoff",
  "",
  "- Target: Turn Response",
  "- Shape: Comment",
  "- Requirement: Required",
  "",
  "- Current Artifact: Name the one artifact that is current now.",
  "",
  "#### Trust Surface",
  "",
  "- `Current Artifact`",
  "",
  "- Standalone Read: This output should stand on its own. The next owner should know which artifact is current now.",
]
[[cases]]
name = "bound own scope still overlaps direct exact preservation on the same artifact"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_BOUND_OWN_AND_DIRECT_EXACT_OVERLAP.prompt"
agent = "InvalidBoundOwnAndDirectExactOverlapDemo"
exception_type = "CompileError"
error_code = "E353"
message_contains = [
  "Owned scope overlaps exact-preserved scope",
]

[[cases]]
name = "owned scope can target an emitted output without changing current truth"
status = "active"
kind = "render_contract"
agent = "OutputScopedOwnershipDemo"
assertion = "exact_lines"
expected_lines = [
  "Keep a modeled emitted output writable without moving current truth.",
