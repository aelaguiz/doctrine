error_code = "E561"

[[cases]]
name = "skill flow route binding whose choice does not target the edge target fails with E561"
status = "active"
kind = "compile_fail"
prompt = "prompts/invalid_route_target_mismatch/skills/controller/SKILL.prompt"
exception_type = "CompileError"
error_code = "E561"

[[cases]]
name = "skill flow route binding that names an unknown route field fails with E561"
status = "active"
kind = "compile_fail"
prompt = "prompts/invalid_unknown_route_field/skills/controller/SKILL.prompt"
exception_type = "CompileError"
error_code = "E561"
