[[cases]]
name = "multi-subject review requires disambiguation proof"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_SUBJECT_SET_WITHOUT_DISAMBIGUATION.prompt"
agent = "InvalidSubjectSetWithoutDisambiguationDemo"
exception_type = "CompileError"
error_code = "E489"
message_contains = [
  "Review subject set requires disambiguation",
  "on_accept",
]

[[cases]]
name = "carried active mode requires a bound review field"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_MISSING_ACTIVE_MODE_BINDING.prompt"
agent = "InvalidMissingActiveModeBindingDemo"
exception_type = "CompileError"
error_code = "E473"
message_contains = [
  "Review fields are incomplete",
  "active_mode",
]

