[[cases]]
name = "multi-subject review requires disambiguation proof"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_SUBJECT_SET_WITHOUT_DISAMBIGUATION.prompt"
agent = "InvalidSubjectSetWithoutDisambiguationDemo"
exception_type = "CompileError"
error_code = "E489"
message_contains = [
  "Review subject set requires disambiguation",
  "on_accept",
]

