schema_version = 1
default_prompt = "prompts/AGENTS.prompt"

[[cases]]
name = "multi-subject review carries active mode and trigger reason through one durable comment"
status = "active"
kind = "render_contract"
agent = "MultiSubjectReviewDemo"
assertion = "exact_lines"
expected_lines = [
  "Keep multi-subject review current truth and carried state aligned.",
  "",
  "## Multi-Subject Review",
  "",
  "Review subjects: Draft Spec, and Metadata Record.",
  "Shared review contract: Multi-Subject Review Contract.",
  "",
  "### Contract Checks",
  "",
  "Reject: The selected subject still needs changes.",
  "",
  "Accept only if The shared review contract passes.",
  "",
  "### If Accepted",
  "",
  "Match ReviewFacts.selected_mode:",
  "If draft-rewrite:",
  "- Current artifact: Draft Spec.",
  "- Carry active mode: draft-rewrite.",
  "- Carry trigger reason: structure-gap.",
  "- Accepted draft rewrite goes to RevisionOwner.",
  "If metadata-refresh:",
  "- Current artifact: Metadata Record.",
  "- Carry active mode: metadata-refresh.",
  "- Carry trigger reason: stale-metadata.",
  "- Accepted metadata refresh goes to RevisionOwner.",
  "",
  "### If Rejected",
  "",
  "Match ReviewFacts.selected_mode:",
  "If draft-rewrite:",
  "- Current artifact: Draft Spec.",
  "- Carry active mode: draft-rewrite.",
  "- Carry trigger reason: structure-gap.",
  "- Rejected draft rewrite goes to RevisionOwner.",
  "If metadata-refresh:",
  "- Current artifact: Metadata Record.",
  "- Carry active mode: metadata-refresh.",
  "- Carry trigger reason: stale-metadata.",
  "- Rejected metadata refresh goes to RevisionOwner.",
  "",
  "## Inputs",
  "",
  "### Draft Spec",
  "",
  "- Source: File",
  "- Path: `unit_root/DRAFT_SPEC.md`",
  "- Shape: Markdown Document",
  "- Requirement: Required",
  "",
  "Use the current draft specification when the review mode is draft rewrite.",
  "",
  "### Metadata Record",
  "",
  "- Source: File",
  "- Path: `unit_root/METADATA.json`",
  "- Shape: Json Object",
  "- Requirement: Required",
  "",
  "Use the current metadata record when the review mode is metadata refresh.",
  "",
  "### Review Facts",
  "",
  "- Source: Prompt",
  "- Shape: Json Object",
  "- Requirement: Required",
  "",
  "Use the host facts that say which review mode is live and whether the selected subject still needs changes.",
  "",
  "## Outputs",
  "",
  "### Multi-Subject Review Comment",
  "",
  "- Target: Turn Response",
  "- Shape: Comment",
  "- Requirement: Required",
  "",
  "#### Verdict",
  "",
  "Say whether the review accepted the selected subject or asked for changes.",
  "",
  "#### Reviewed Artifact",
  "",
  "Name the reviewed artifact this review judged.",
  "",
  "#### Analysis Performed",
  "",
  "Sum up the review work that led to the verdict.",
  "",
  "#### Output Contents That Matter",
  "",
  "Sum up the parts of the selected subject the next owner should read first.",
  "",
  "#### Next Owner",
  "",
  "Name the next owner, including RevisionOwner under both review modes. The next owner stays the same even when the live mode and current artifact change.",
  "",
  "#### Current Artifact",
  "",
  "Name the artifact that is current in the selected review mode.",
  "",
  "#### Active Mode",
  "",
  "Rendered only when present(active_mode).",
  "",
  "Name the active review mode for the current artifact.",
  "",
  "#### Trigger Reason",
  "",
  "Rendered only when present(trigger_reason).",
  "",
  "Name the trigger reason for the live artifact and mode.",
  "",
  "#### Failure Detail",
  "",
  "Rendered only when verdict is changes requested.",
  "",
  "##### Failing Gates",
  "",
  "Name the failing review gates in authored order.",
  "",
  "#### Trust Surface",
  "",
  "- Current Artifact",
  "- Active Mode when present(active_mode)",
  "- Trigger Reason when present(trigger_reason)",
  "",
  "#### Standalone Read",
  "",
  "This comment should stand on its own. The next owner should know which subject was reviewed, which artifact is current, which active mode chose it, what trigger reason applies, and who owns next.",
]

