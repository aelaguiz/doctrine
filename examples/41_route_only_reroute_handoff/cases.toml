schema_version = 1
default_prompt = "prompts/AGENTS.prompt"

[[cases]]
name = "route-only turns can reroute explicitly and pair the route with a handoff comment"
status = "active"
kind = "render_contract"
agent = "RouteOnlyRerouteHandoffDemo"
assertion = "exact_lines"
approx_ref = "ref/route_only_reroute_handoff_demo/AGENTS.md"
expected_lines = [
  "Keep explicit route-only reroutes aligned with the emitted handoff comment.",
  "",
  "## Route-Only Reroute",
  "",
  "Stop and reroute when the specialist output is missing and the next owner is still unclear.",
  "",
  "This pass runs only when current specialist output is missing and next owner is unknown.",
  "",
  "No artifact is current for this turn.",
  "",
  "Stop: No specialist artifact is current for this turn.",
  "",
  "Route the same issue back to RoutingOwner.",
  "",
  "## Inputs",
  "",
  "### Route Facts",
  "",
  "- Source: Prompt",
  "- Shape: Json Object",
  "- Requirement: Required",
  "",
  "Use the host route facts. They say whether the current specialist output is missing, whether the next owner is still unclear, and what RoutingOwner should do next after the reroute.",
  "",
  "## Outputs",
  "",
  "### Reroute Handoff Comment",
  "",
  "- Target: Turn Response",
  "- Shape: Comment",
  "- Requirement: Required",
  "",
  "#### Current Route",
  "",
  "Say this is a route-only reroute turn. No specialist artifact is current, and the issue goes back to RoutingOwner.",
  "",
  "#### Next Owner",
  "",
  "Say plainly that RoutingOwner now owns the rerouted turn.",
  "",
  "#### Next Step",
  "",
  "Name the next reroute follow-up step from the route facts.",
  "",
  "#### Standalone Read",
  "",
  "This comment should stand on its own. The next owner should know that this route-only turn rerouted because no specialist artifact is current, who owns next, and what reroute step comes next.",
]

[[cases]]
name = "routed next_owner fields must structurally bind the explicit reroute target"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_NEXT_OWNER_OMITS_ROUTE_TARGET.prompt"
agent = "InvalidRouteOnlyRerouteHandoffDemo"
exception_type = "CompileError"
error_code = "E339"
message_contains = [
  "next_owner field must interpolate routed target",
  "RerouteHandoffComment.next_owner",
  "RoutingOwner",
]
