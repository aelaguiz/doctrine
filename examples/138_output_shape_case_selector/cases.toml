schema_version = 1
default_prompt = "prompts/AGENTS.prompt"

[[cases]]
name = "output shape selector + case dispatches per-agent prose"
status = "active"
kind = "render_contract"
agent = "WriterProducer"
assertion = "exact_lines"
expected_lines = [
  "Draft the next writer turn.",
  "",
  "## Final Output",
  "",
  "### Writer Turn Response",
  "",
  "> **Final answer contract**",
  "> End the turn with one final assistant message that follows this schema.",
  "",
  "| Contract | Value |",
  "| --- | --- |",
  "| Message type | Final assistant message |",
  "| Format | Structured JSON |",
  "| Shape | Writer Turn JSON |",
  "| Schema | Writer Turn Schema |",
  "| Profile | OpenAIStructuredOutput |",
  "| Generated Schema | `schemas/writer_turn_response.schema.json` |",
  "| Requirement | Required |",
  "",
  "#### Payload Fields",
  "",
  "| Field | Type | Required On Wire | Null Allowed | Meaning |",
  "| --- | --- | --- | --- | --- |",
  "| `headline` | string | Yes | No |  |",
  "| `body` | string | Yes | No |  |",
  "",
  "#### Example",
  "",
  "```json",
  "{",
  '  "headline": "Draft ready for review",',
  '  "body": "Short draft covering the first milestone."',
  "}",
  "```",
  "",
  "- Kind: Json Object",
  "",
  "#### Field Notes",
  "",
  "Always ground the headline in today's work.",
  "Write one fresh draft. Do not critique prior drafts.",
]

