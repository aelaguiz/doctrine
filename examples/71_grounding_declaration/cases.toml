schema_version = 1
default_prompt = "prompts/AGENTS.prompt"

[[cases]]
name = "grounding declares explicit protocol policy without inventing a side channel"
status = "active"
kind = "render_contract"
agent = "ClaimGroundingDemo"
assertion = "exact_lines"
expected_lines = [
  "Keep grounding policy explicit and route review when the wording still needs follow-up.",
  "",
  "## Claim Grounding",
  "",
  "Ground this pass against Repo Facts.",
  "Target: wording_claim.",
  "Start from accepted_claim unless stale_claim.",
  "Do not use unchecked_claim.",
  "Allow cited_fact.",
  "If needs_review, route to Review Lead.",
  "",
  "## Inputs",
  "",
  "### Repo Facts",
  "",
  "- Source: Prompt",
  "- Shape: Json Object",
  "- Requirement: Required",
  "",
  "Use the host facts that ground the current wording claim.",
]

[[cases]]
name = "grounding rejects abstract route targets"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_ABSTRACT_GROUNDING_ROUTE.prompt"
agent = "InvalidGroundingRouteDemo"
exception_type = "CompileError"
error_code = "E282"
message_contains = [
  "Route target must be a concrete agent",
  "ReviewLead",
]

[[cases]]
name = "preserve mapping can keep grounding source-to-target maps stable"
status = "active"
kind = "render_contract"
agent = "ClaimGroundingMappingDemo"
assertion = "exact_lines"
expected_lines = [
  "Keep the grounding source-to-target map stable during a narrow wording pass.",
  "",
  "## Preserve Grounding Mapping",
  "",
  "Current artifact: Repo Facts.",
  "",
  "Preserve mapping `ClaimGrounding`.",
  "",
  "## Inputs",
  "",
  "### Repo Facts",
  "",
  "- Source: Prompt",
  "- Shape: Json Object",
  "- Requirement: Required",
  "",
  "Use the host facts that ground the current wording claim.",
  "",
  "## Outputs",
  "",
  "### Coordination Handoff",
  "",
  "| Contract | Value |",
  "| --- | --- |",
  "| Target | Turn Response |",
  "| Shape | Comment |",
  "| Requirement | Required |",
  "",
  "#### Current Artifact",
  "",
  "Name the one artifact that is current now.",
  "",
  "#### Trust Surface",
  "",
  "- `Current Artifact`",
  "",
  "#### Standalone Read",
  "",
  "A downstream owner can read this output alone and know what remains current.",
]
