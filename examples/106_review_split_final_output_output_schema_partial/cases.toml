  "| Field | Type | Required On Wire | Null Allowed | Meaning |",
  "| --- | --- | --- | --- | --- |",
  "| `current_artifact` | string | Yes | Yes | Current artifact after review. |",
  "| `next_owner` | string | Yes | Yes | Next owner after review when one exists. |",
