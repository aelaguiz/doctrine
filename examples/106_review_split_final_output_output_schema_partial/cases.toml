assertion = "exact_lines"
expected_lines = [
  "Emit the review comment and end with a small partial JSON result.",
  "",
  "## Acceptance Review",
  "",
  "Review subject: Draft Plan.",
  "Shared review contract: Plan Review Contract.",
  "",
  "### Basis Checks",
