schema_version = 1
default_prompt = "prompts/AGENTS.prompt"

[[cases]]
name = "owner-aware schema attachments keep json schema and doctrine schema separate"
status = "active"
kind = "render_contract"
agent = "OwnerAwareSchemaDemo"
assertion = "exact_lines"
approx_ref = "ref/owner_aware_schema_demo/AGENTS.md"
expected_lines = [
  "Check Delivery JSON Schema before you publish Delivery Plan.",
  "",
  "## Publish",
  "",
  "Produce the file with the reusable inventory schema attached.",
  "",
  "## Outputs",
  "",
  "### Delivery Plan",
  "",
  "- Target: File",
  "- Path: `unit_root/DELIVERY_PLAN.md`",
  "- Shape: Markdown Document",
  "- Requirement: Required",
  "- Schema: Delivery Inventory",
  "",
  "#### Required Sections",
  "",
  "##### Summary",
  "",
  "Include a short summary.",
  "",
  "##### Artifacts",
  "",
  "List the produced artifacts.",
]

[[cases]]
name = "output schema rejects local must_include ownership"
status = "active"
kind = "parse_fail"
prompt = "prompts/INVALID_OUTPUT_SCHEMA_WITH_LOCAL_MUST_INCLUDE.prompt"
exception_type = "ParseError"
error_code = "E199"
message_contains = [
  "schema:",
  "must_include:",
]
