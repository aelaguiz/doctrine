schema_version = 1
default_prompt = "prompts/AGENTS.prompt"

[[cases]]
name = "owner-aware schema attachments keep output schema and doctrine schema separate"
status = "active"
kind = "render_contract"
agent = "OwnerAwareSchemaDemo"
assertion = "exact_lines"
approx_ref = "ref/owner_aware_schema_demo/AGENTS.md"
expected_lines = [
  "Check Delivery Output Schema before you publish Delivery Plan.",
  "",
  "## Publish",
  "",
  "Produce the file with the reusable inventory schema attached.",
  "",
  "## Outputs",
  "",
  "### Delivery Plan",
  "",
  "| Contract | Value |",
  "| --- | --- |",
  "| Target | File |",
  "| Path | `unit_root/DELIVERY_PLAN.md` |",
  "| Shape | Markdown Document |",
  "| Requirement | Required |",
  "| Schema | Delivery Inventory |",
  "",
  "#### Required Sections",
  "",
  "##### Summary",
  "",
  "Include a short summary.",
  "",
  "##### Artifacts",
  "",
  "List the produced artifacts.",
]

[[cases]]
name = "output schema rejects local must_include ownership"
status = "active"
kind = "parse_fail"
prompt = "prompts/invalid_output_schema_with_local_must_include/AGENTS.prompt"
exception_type = "ParseError"
error_code = "E199"
message_contains = [
  "schema:",
  "must_include:",
]

[[cases]]
name = "output schema rejects structure ownership on the same markdown artifact"
status = "active"
kind = "parse_fail"
prompt = "prompts/invalid_output_schema_with_structure/AGENTS.prompt"
exception_type = "ParseError"
error_code = "E199"
message_contains = [
  "schema:",
  "structure:",
]
