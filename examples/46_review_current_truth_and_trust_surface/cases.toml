schema_version = 1
default_prompt = "prompts/AGENTS.prompt"

[[cases]]
name = "review current truth and trust surface stay coupled through the emitted comment"
status = "active"
kind = "render_contract"
agent = "CurrentTruthReviewDemo"
assertion = "exact_lines"
expected_lines = [
  "Keep review current truth explicit and trusted downstream.",
  "",
  "## Current Truth Review",
  "",
  "Review subject: Draft Spec.",
  "Shared review contract: Current Truth Review Contract.",
  "",
  "### Current Truth Checks",
  "",
  "Reject: The draft still leaves the core decision unclear.",
  "",
  "Accept only if The shared review contract passes.",
  "",
  "### If Accepted",
  "",
  "Current artifact: Draft Spec.",
  "",
  "Accepted draft goes to ReviewLead.",
  "",
  "### If Rejected",
  "",
  "Current artifact: Draft Spec.",
  "",
  "Rejected draft goes to DraftAuthor.",
  "",
  "## Inputs",
  "",
  "### Draft Spec",
  "",
  "- Source: File",
  "- Path: `unit_root/DRAFT_SPEC.md`",
  "- Shape: Markdown Document",
  "- Requirement: Required",
  "",
  "Use the current draft spec as the reviewed artifact.",
  "",
  "## Outputs",
  "",
  "### Current Truth Review Comment",
  "",
  "- Target: Turn Response",
  "- Shape: Comment",
  "- Requirement: Required",
  "",
  "#### Verdict",
  "",
  "Say whether the review accepted the draft or asked for changes.",
  "",
  "#### Reviewed Artifact",
  "",
  "Name the reviewed artifact this review judged.",
  "",
  "#### Analysis Performed",
  "",
  "Sum up the review work that led to the verdict.",
  "",
  "#### Output Contents That Matter",
  "",
  "Summarize the parts of the draft the next owner must read first.",
  "",
  "#### Next Owner",
  "",
  "Name the next owner, including ReviewLead when the draft is accepted and DraftAuthor when the draft is rejected.",
  "",
  "#### Current Artifact",
  "",
  "Name the artifact that remains current after this review outcome.",
  "",
  "#### Failure Detail",
  "",
  "Rendered only when verdict is changes requested.",
  "",
  "##### Failing Gates",
  "",
  "Name the failing review gates in authored order.",
  "",
  "#### Trust Surface",
  "",
  "- Current Artifact",
  "",
  "#### Standalone Read",
  "",
  "This comment should stand on its own. The next owner should know what was reviewed, what verdict landed, what is still current, who owns next, and which parts of the draft matter now.",
]

[[cases]]
name = "review currentness requires a declared output carrier"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_CURRENT_ARTIFACT_BAD_CARRIER.prompt"
agent = "InvalidCurrentArtifactBadCarrierDemo"
exception_type = "CompileError"
error_code = "E487"
message_contains = [
  "MissingReviewComment.current_artifact",
  "concrete-turn output",
]

[[cases]]
name = "review currentness carriers must be trusted explicitly"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_CARRIER_NOT_IN_TRUST_SURFACE.prompt"
agent = "InvalidCarrierNotInTrustSurfaceDemo"
exception_type = "CompileError"
error_code = "E488"
message_contains = [
  "trust_surface",
  "current_artifact",
]

[[cases]]
name = "review currentness carrier fields must disappear on current-none branches"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_CURRENT_NONE_REQUIRES_GUARDED_CARRIER.prompt"
agent = "InvalidCurrentNoneRequiresGuardedCarrierDemo"
exception_type = "CompileError"
error_code = "E497"
message_contains = [
  "current none",
  "CurrentTruthReviewComment.current_artifact",
]

[[cases]]
name = "review currentness cannot jump to an artifact outside the reviewed subjects"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_CURRENT_ARTIFACT_OUTSIDE_SUBJECT.prompt"
agent = "InvalidCurrentArtifactOutsideSubjectDemo"
exception_type = "CompileError"
error_code = "E469"
message_contains = [
  "Review current artifact must stay rooted in a review subject or emitted output",
  "OtherSpec",
]

[[cases]]
name = "review currentness can switch inline on blocked rejects"
status = "active"
kind = "render_contract"
prompt = "prompts/GUARDED_CURRENTNESS_ON_BLOCKED_GATE.prompt"
agent = "GuardedCurrentTruthReviewDemo"
assertion = "exact_lines"
expected_lines = [
  "Keep blocked review currentness explicit without wrapping the whole outcome.",
  "",
  "## Guarded Current Truth Review",
  "",
  "Review subject: Draft Spec.",
  "Shared review contract: Current Truth Review Contract.",
  "",
  "### Handoff First",
  "",
  "Block: The producer handoff is incomplete.",
  "",
  "### Current Truth Checks",
  "",
  "Reject: The draft still leaves the core decision unclear.",
  "",
  "Accept only if The shared review contract passes.",
  "",
  "### If Accepted",
  "",
  "Current artifact: Draft Spec.",
  "",
  "Accepted draft goes to ReviewLead.",
  "",
  "### If Rejected",
  "",
  "When missing(blocked_gate), current artifact: Draft Spec.",
  "",
  "When present(blocked_gate), there is no current artifact for this outcome.",
  "",
  "Draft follow-up remains with DraftAuthor.",
  "",
  "## Inputs",
  "",
  "### Producer Handoff",
  "",
  "- Source: Prompt",
  "- Shape: Json Object",
  "- Requirement: Required",
  "",
  "Use the producer handoff that says if review stopped before content review began.",
  "",
  "### Draft Spec",
  "",
  "- Source: File",
  "- Path: `unit_root/DRAFT_SPEC.md`",
  "- Shape: Markdown Document",
  "- Requirement: Required",
  "",
  "Use the current draft specification as the reviewed artifact once content review begins.",
  "",
  "## Outputs",
  "",
  "### Guarded Current Truth Review Comment",
  "",
  "- Target: Turn Response",
  "- Shape: Comment",
  "- Requirement: Required",
  "",
  "#### Verdict",
  "",
  "Say whether the review accepted the draft or asked for changes.",
  "",
  "#### Reviewed Artifact",
  "",
  "Name the reviewed artifact this review judged. When review blocks before content review starts, name the producer handoff instead of pretending the draft stayed current.",
  "",
  "#### Analysis Performed",
  "",
  "Sum up the review work that led to the verdict.",
  "",
  "#### Output Contents That Matter",
  "",
  "Summarize the parts of the draft or producer handoff the next owner must read first.",
  "",
  "#### Current Artifact",
  "",
  "Rendered only when present(current_artifact).",
  "",
  "Name the artifact that remains current after this review outcome.",
  "",
  "#### Next Owner",
  "",
  "Name the next owner, including ReviewLead when the draft is accepted and DraftAuthor when review blocks or rejects the draft.",
  "",
  "#### Failure Detail",
  "",
  "Rendered only when verdict is changes requested.",
  "",
  "##### Blocked Gate",
  "",
  "Rendered only when present(blocked_gate).",
  "",
  "Name the first blocking gate when the review stopped before content review started.",
  "",
  "##### Failing Gates",
  "",
  "List the failed review gates in authored order. Include the blocked gate when review stopped before content review began.",
  "",
  "#### Trust Surface",
  "",
  "- Current Artifact when present(current_artifact)",
  "",
  "#### Standalone Read",
  "",
  "This comment should stand on its own. The next owner should know if review stopped before content review began, what is still current, who owns next, and which parts of the draft or producer handoff still matter.",
]
