schema_version = 1
default_prompt = "prompts/AGENTS.prompt"

[[cases]]
name = "guarded output sections render as keyed conditional shells and stay addressable"
status = "active"
kind = "render_contract"
agent = "GuardedOutputSectionsDemo"
assertion = "exact_lines"
approx_ref = "ref/guarded_output_sections_demo/AGENTS.md"
expected_lines = [
  "Keep conditional output readback explicit and addressable.",
  "",
  "## Read First",
  "",
  "Read the guarded output items directly from the emitted output contract.",
  "",
  "### Read Now",
  "",
  "- Rewrite Mode",
  "- Repeated Problem",
  "",
  "Read Rewrite Mode and Repeated Problem when the conditional readback matters for this turn.",
  "",
  "## Inputs",
  "",
  "### Route Facts",
  "",
  "- Source: Prompt",
  "- Shape: Json Object",
  "- Requirement: Required",
  "",
  "Use the host route facts. They say whether the current section is new or a full rewrite, whether the same critic miss happened again, and which status facts drove the turn.",
  "",
  "## Outputs",
  "",
  "### Guarded Readback Comment",
  "",
  "- Target: Turn Response",
  "- Shape: Comment",
  "- Requirement: Required",
  "",
  "- Rewrite Mode: Show this only when route facts section status is new or full rewrite. Name whether the section is brand new or undergoing a full rewrite.",
  "- Repeated Problem: Show this only when critic miss is repeated. Say whether the same critic miss has repeated.",
  "- Standalone Read: This comment should stand on its own. The next owner should know which conditional readback blocks might appear.",
]
[[cases]]
name = "nested guarded output sections render at the correct heading depth"
status = "active"
kind = "render_contract"
agent = "NestedGuardedOutputSectionsDemo"
assertion = "exact_lines"
approx_ref = "ref/nested_guarded_output_sections_demo/AGENTS.md"
expected_lines = [
  "Keep nested conditional output readback explicit and addressable.",
  "",
  "## Read First",
  "",
  "Read the nested guarded output items directly from the emitted output contract.",
  "",
  "### Read Now",
  "",
  "- Status Summary",
  "- Rewrite Detail",
  "",
  "Read Status Summary before Rewrite Detail when nested conditional detail is in play.",
  "",
  "## Inputs",
  "",
  "### Route Facts",
  "",
  "- Source: Prompt",
  "- Shape: Json Object",
  "- Requirement: Required",
  "",
  "Use the host route facts. They say whether the current section is new or a full rewrite, whether the same critic miss happened again, and which status facts drove the turn.",
  "",
  "## Outputs",
  "",
  "### Nested Guarded Readback Comment",
  "",
  "- Target: Turn Response",
  "- Shape: Comment",
  "- Requirement: Required",
  "",
  "#### Detail Panel",
  "",
  "##### Status Summary",
  "",
  "Summarize the status facts that drove this turn.",
  "",
  "##### Rewrite Detail",
  "",
  "Show this only when route facts section status is new or full rewrite.",
  "",
  "Explain why rewrite-aware handling applies on this turn.",
  "",
  "- Standalone Read: This comment should stand on its own. The next owner should know which nested conditional details might appear.",
]
[[cases]]
name = "guarded output items can guard one scalar field directly"
status = "active"
kind = "render_contract"
agent = "GuardedOutputItemsDemo"
assertion = "exact_lines"
expected_lines = [
  "Keep guarded output items explicit.",
  "",
  "## Inputs",
  "",
  "### Route Facts",
  "",
  "- Source: Prompt",
  "- Shape: Json Object",
  "- Requirement: Required",
  "",
  "Use the host route facts. They say whether the current section is new or a full rewrite, whether the same critic miss happened again, and which status facts drove the turn.",
  "",
  "## Outputs",
  "",
  "### Guarded Scalar Readback Comment",
  "",
  "- Target: Turn Response",
  "- Shape: Comment",
  "- Requirement: Required",
  "",
  "- Rewrite Note: Show this only when route facts section status is new or full rewrite. `Rewrite applies.`",
  "- Standalone Read: This comment should stand on its own. The next owner should know when guarded fields may appear.",
]
[[cases]]
name = "title-only guarded output syntax is not part of the shipped grammar"
status = "active"
kind = "parse_fail"
prompt = "prompts/invalid_title_only_guarded_output_section/AGENTS.prompt"
exception_type = "ParseError"
error_code = "E101"
message_contains = [
  "Unexpected token",
  "Repeated Problem",
]

