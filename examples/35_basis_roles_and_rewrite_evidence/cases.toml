schema_version = 1
default_prompt = "prompts/AGENTS.prompt"

[[cases]]
name = "basis roles can separate comparison help truth and rewrite evidence"
status = "active"
kind = "render_contract"
agent = "RewriteAwarePolishDemo"
assertion = "exact_lines"
approx_ref = "ref/rewrite_aware_polish_demo/AGENTS.md"
expected_lines = [
  "Separate comparison help, live truth, and rewrite evidence.",
  "",
  "## Rewrite-Aware Polish",
  "",
  "The current artifact is Section Metadata.",
  "",
  "Accepted Peer Set is support only for comparison.",
  "",
  "When CurrentHandoff.rewrite_regime is rewrite, ignore {`SectionMetadata.name`, `SectionMetadata.description`} for rewrite evidence.",
  "",
  "Do not treat Stale Metadata Notes as truth for this pass.",
  "",
  "## Inputs",
  "",
  "### Current Handoff",
  "",
  "- Source: Prompt",
  "- Shape: Json Object",
  "- Requirement: Required",
  "",
  "Use the host-provided handoff facts that say whether this pass is a rewrite.",
  "",
  "### Accepted Peer Set",
  "",
  "- Source: File",
  "- Path: `catalog/accepted_peers.json`",
  "- Shape: Json Object",
  "- Requirement: Advisory",
  "",
  "### Stale Metadata Notes",
  "",
  "- Source: File",
  "- Path: `unit_root/_authoring/stale_metadata_notes.md`",
  "- Shape: Markdown Document",
  "- Requirement: Advisory",
  "",
  "## Outputs",
  "",
  "### Section Metadata",
  "",
  "| Contract | Value |",
  "| --- | --- |",
  "| Target | File |",
  "| Path | `unit_root/_authoring/section_metadata.json` |",
  "| Shape | Json Object |",
  "| Requirement | Required |",
  "",
  "### Coordination Handoff",
  "",
  "- Target: Turn Response",
  "- Shape: Comment",
  "- Requirement: Required",
  "",
  "- Current Artifact: Name the one artifact that is current now.",
  "- Comparison Basis: Name any comparison-only inputs used in this pass.",
  "- Rewrite Evidence Exclusions: Name any fields whose old values do not count as rewrite evidence.",
  "",
  "#### Trust Surface",
  "",
  "- `Current Artifact`",
  "- `Comparison Basis`",
  "- Rewrite Evidence Exclusions on rewrite passes",
  "",
  "- Standalone Read: This output should stand on its own. The next owner should know what is current, what was comparison-only, and what old wording no longer counts as rewrite evidence.",
]
[[cases]]
name = "comparison support cannot also be ignored for comparison"
status = "active"
kind = "compile_fail"
prompt = "prompts/invalid_support_only_and_ignore_comparison_contradiction/AGENTS.prompt"
agent = "InvalidSupportOnlyAndIgnoreComparisonContradiction"
exception_type = "CompileError"
error_code = "E362"
location_line = 45
related = [
    { label = "overlapping `support_only` statement", line = 42 },
]

[[cases]]
name = "the current artifact cannot be ignored for truth"
status = "active"
kind = "compile_fail"
prompt = "prompts/invalid_current_artifact_ignored_for_truth/AGENTS.prompt"
agent = "InvalidCurrentArtifactIgnoredForTruth"
exception_type = "CompileError"
error_code = "E361"
location_line = 35
related = [
    { label = "current artifact statement", line = 32 },
]
