schema_version = 1
default_prompt = "prompts/AGENTS.prompt"

[[cases]]
name = "case-selected review_family stays exhaustive and keeps current artifact explicit"
status = "active"
kind = "render_contract"
agent = "SelectedReviewFamilyDemo"
assertion = "exact_lines"
expected_lines = [
  "Keep case-selected review families explicit and exhaustive.",
  "",
  "## Selected Review",
  "",
  "Selected review mode: Review Mode.",
  "",
  "### Handoff First",
  "",
  "Reject: Shared review handoff is incomplete.",
  "",
  "### Draft Path",
  "",
  "Review subject: Draft Spec.",
  "Shared review contract: Draft Review Contract.",
  "",
  "#### Checks",
  "",
  "Accept only if The draft review contract passes.",
  "",
  "#### If Accepted",
  "",
  "Current artifact: Draft Spec.",
  "",
  "Accepted draft rewrite goes to RevisionOwner.",
  "",
  "#### If Rejected",
  "",
  "Current artifact: Draft Spec.",
  "",
  "Rejected draft rewrite goes to RevisionOwner.",
  "",
  "### Metadata Path",
  "",
  "Review subject: Metadata Record.",
  "Shared review contract: Metadata Review Contract.",
  "",
  "#### Checks",
  "",
  "Accept only if The metadata review contract passes.",
  "",
  "#### If Accepted",
  "",
  "Current artifact: Metadata Record.",
  "",
  "Accepted metadata refresh goes to RevisionOwner.",
  "",
  "#### If Rejected",
  "",
  "Current artifact: Metadata Record.",
  "",
  "Rejected metadata refresh goes to RevisionOwner.",
  "",
  "## Inputs",
  "",
  "### Draft Spec",
  "",
  "- Source: File",
  "- Path: `unit_root/DRAFT_SPEC.md`",
  "- Shape: Markdown Document",
  "- Requirement: Required",
  "",
  "Use the current draft specification when the selected mode is draft rewrite.",
  "",
  "### Metadata Record",
  "",
  "- Source: File",
  "- Path: `unit_root/METADATA.json`",
  "- Shape: Json Object",
  "- Requirement: Required",
  "",
  "Use the current metadata record when the selected mode is metadata refresh.",
  "",
  "### Review Facts",
  "",
  "- Source: Prompt",
  "- Shape: Json Object",
  "- Requirement: Required",
  "",
  "Use the host facts that say which review mode is live and whether the shared handoff is incomplete.",
  "",
  "## Outputs",
  "",
  "### Selected Review Comment",
  "",
  "- Target: Turn Response",
  "- Shape: Comment",
  "- Requirement: Required",
  "",
  "- Verdict: Say whether the review accepted the selected subject or asked for changes.",
  "- Reviewed Artifact: Name the reviewed artifact this review judged.",
  "- Analysis Performed: Sum up the review work that led to the verdict.",
  "- Output Contents That Matter: Sum up the parts of the selected subject the next owner should read first.",
  "- Next Owner: Name the next owner. Use RevisionOwner in both selected review modes.",
  "- Current Artifact: Name the artifact that is current in the selected review mode.",
  "",
  "#### Failure Detail",
  "",
  "Show this only when verdict is changes requested.",
  "",
  "##### Failing Gates",
  "",
  "Name the failing review gates in authored order.",
  "",
  "#### Trust Surface",
  "",
  "- `Current Artifact`",
  "",
  "- Standalone Read: This comment should stand on its own. The next owner should know which subject was reviewed, which artifact is current now, and who owns next.",
]
[[cases]]
name = "case-selected review_family rejects overlapping cases"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_OVERLAPPING_CASES.prompt"
agent = "InvalidCaseOverlapDemo"
exception_type = "CompileError"
error_code = "E470"
location_line = 96
related = [
    { label = "first case for `draft-rewrite`", line = 83 },
]

