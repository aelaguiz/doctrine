schema_version = 1
default_prompt = "prompts/AGENTS.prompt"

[[cases]]
name = "case-selected review_family stays exhaustive and keeps current artifact explicit"
status = "active"
kind = "render_contract"
agent = "SelectedReviewFamilyDemo"
assertion = "exact_lines"
expected_lines = [
  "Keep case-selected review families explicit and exhaustive.",
  "",
  "## Selected Review",
  "",
  "Selected review mode: Review Mode.",
  "",
  "### Handoff First",
  "",
  "Reject: Shared review handoff is incomplete.",
  "",
  "### Draft Path",
  "",
  "Review subject: Draft Spec.",
  "Shared review contract: Draft Review Contract.",
  "",
  "#### Checks",
  "",
  "Accept only if The draft review contract passes.",
  "",
  "#### If Accepted",
  "",
  "Current artifact: Draft Spec.",
  "",
  "Accepted draft rewrite returns to RevisionOwner.",
  "",
  "#### If Rejected",
  "",
  "Current artifact: Draft Spec.",
  "",
  "Rejected draft rewrite returns to RevisionOwner.",
  "",
  "### Metadata Path",
  "",
  "Review subject: Metadata Record.",
  "Shared review contract: Metadata Review Contract.",
  "",
  "#### Checks",
  "",
  "Accept only if The metadata review contract passes.",
  "",
  "#### If Accepted",
  "",
  "Current artifact: Metadata Record.",
  "",
  "Accepted metadata refresh returns to RevisionOwner.",
  "",
  "#### If Rejected",
  "",
  "Current artifact: Metadata Record.",
  "",
  "Rejected metadata refresh returns to RevisionOwner.",
  "",
  "## Inputs",
  "",
  "### Draft Spec",
  "",
  "- Source: File",
  "- Path: `unit_root/DRAFT_SPEC.md`",
  "- Shape: Markdown Document",
  "- Requirement: Required",
  "",
  "Use the current draft specification when the selected mode is draft rewrite.",
  "",
  "### Metadata Record",
  "",
  "- Source: File",
  "- Path: `unit_root/METADATA.json`",
  "- Shape: Json Object",
  "- Requirement: Required",
  "",
  "Use the current metadata record when the selected mode is metadata refresh.",
  "",
  "### Review Facts",
  "",
  "- Source: Prompt",
  "- Shape: Json Object",
  "- Requirement: Required",
  "",
  "Use the host facts that say which review mode is live and whether the shared handoff is incomplete.",
  "",
  "## Outputs",
  "",
  "### Selected Review Comment",
  "",
  "- Target: Turn Response",
  "- Shape: Comment",
  "- Requirement: Required",
  "",
  "#### Verdict",
  "",
  "Say whether the review accepted the selected subject or requested changes.",
  "",
  "#### Reviewed Artifact",
  "",
  "Name the reviewed artifact this review judged.",
  "",
  "#### Analysis Performed",
  "",
  "Summarize the review analysis that led to the verdict.",
  "",
  "#### Output Contents That Matter",
  "",
  "Summarize the parts of the selected subject the next owner must read first.",
  "",
  "#### Next Owner",
  "",
  "Name the next owner, including RevisionOwner under both selected review modes.",
  "",
  "#### Current Artifact",
  "",
  "Name the artifact that is current now under the selected review mode.",
  "",
  "#### Failure Detail",
  "",
  "Rendered only when verdict is changes requested.",
  "",
  "##### Failing Gates",
  "",
  "Name the failing review gates in authored order.",
  "",
  "#### Trust Surface",
  "",
  "- Current Artifact",
  "",
  "#### Standalone Read",
  "",
  "A downstream owner should be able to read this comment alone and understand which subject was reviewed, which artifact is current now, and who owns next.",
]

[[cases]]
name = "case-selected review_family rejects overlapping cases"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_OVERLAPPING_CASES.prompt"
agent = "InvalidCaseOverlapDemo"
exception_type = "CompileError"
error_code = "E299"
message_contains = [
  "Review cases overlap",
  "draft_path",
  "duplicate_draft_path",
]

[[cases]]
name = "case-selected review_family rejects non-total cases"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_NON_TOTAL_CASES.prompt"
agent = "InvalidCaseNonTotalDemo"
exception_type = "CompileError"
error_code = "E299"
message_contains = [
  "Review cases must be exhaustive",
]
