  "",
  "## Brief Review",
  "",
  "Review subject: Draft Brief.",
  "Shared review contract: Brief Review Contract.",
  "",
  "### Contract Gate Checks",
  "",
  "Reject: Audience Named.",
  "",
  "Reject: Next Action Clear.",
  "",
  "Accept only if The typed review contract passes.",
  "",
  "### If Accepted",
  "",
  "No artifact is current for this outcome.",
  "",
  "Accepted brief goes to ReviewLead.",
  "",
  "### If Rejected",
  "",
  "No artifact is current for this outcome.",
  "",
  "Rejected brief goes to BriefAuthor.",
  "",
  "## Inputs",
  "",
  "### Draft Brief",
  "",
  "- Source: File",
  "- Path: `brief_root/DRAFT_BRIEF.md`",
  "- Shape: Markdown Document",
  "- Requirement: Required",
  "",
  "- Audience Missing: `Audience Missing`",
  "- Next Action Missing: `Next Action Missing`",
  "",
  "## Outputs",
  "",
  "### Brief Review Comment",
  "",
  "- Target: Turn Response",
  "- Shape: Comment",
  "- Requirement: Required",
  "",
  "- Verdict: State the review verdict.",
  "- Reviewed Artifact: Name the reviewed artifact.",
  "- Analysis Performed: Summarize the review analysis.",
