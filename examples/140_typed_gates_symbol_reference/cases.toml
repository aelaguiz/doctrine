  "- Next Owner: Name ReviewLead when accepted and BriefAuthor when rejected.",
  "",
  "#### Failure Detail",
  "",
  "Show this only when verdict is changes requested.",
  "",
  "##### Failing Gates",
  "",
  "List exact failing gates, including Audience Named and Next Action Clear when they fail.",
