[[cases]]
name = "contract gate refs must name exported review-contract gates"
status = "active"
kind = "compile_fail"
prompt = "prompts/invalid_unknown_contract_gate/AGENTS.prompt"
agent = "BrokenTypedGateDemo"
exception_type = "CompileError"
error_code = "E477"
location_line = 77
