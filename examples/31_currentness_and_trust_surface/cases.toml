schema_version = 1
default_prompt = "prompts/AGENTS.prompt"

[[cases]]
name = "current truth can be carried from an input artifact"
status = "active"
kind = "render_contract"
agent = "CurrentApprovedPlanDemo"
assertion = "exact_lines"
approx_ref = "ref/current_approved_plan_demo/AGENTS.md"
expected_lines = [
  "Carry one portable current artifact through a declared handoff field.",
  "",
  "## Carry Current Truth",
  "",
  "Keep one current artifact explicit and portable.",
  "",
  "The current artifact is Approved Plan.",
  "",
  "## Inputs",
  "",
  "### Approved Plan",
  "",
  "- Source: File",
  "- Path: `unit_root/_authoring/APPROVED_PLAN.md`",
  "- Shape: Markdown Document",
  "- Requirement: Required",
  "",
  "## Outputs",
  "",
  "### Coordination Handoff",
  "",
  "- Target: Turn Response",
  "- Shape: Comment",
  "- Requirement: Required",
  "",
  "- Current Artifact: Name the one artifact that is current now.",
  "",
  "#### Trust Surface",
  "",
  "- `Current Artifact`",
  "",
  "- Standalone Read: This output should stand on its own. The next owner should know which artifact is current now.",
]
[[cases]]
name = "current truth can be carried from a newly produced artifact"
status = "active"
kind = "render_contract"
agent = "CurrentSectionMetadataDemo"
assertion = "exact_lines"
approx_ref = "ref/current_section_metadata_demo/AGENTS.md"
expected_lines = [
  "Carry a newly produced artifact as the current downstream truth.",
  "",
  "## Carry Current Truth",
  "",
  "Keep one current artifact explicit and portable.",
  "",
  "The current artifact is Section Metadata.",
  "",
  "## Outputs",
  "",
  "### Section Metadata",
  "",
  "| Contract | Value |",
  "| --- | --- |",
  "| Target | File |",
  "| Path | `unit_root/_authoring/section_metadata.json` |",
  "| Shape | Json Object |",
  "| Requirement | Required |",
  "",
  "### Coordination Handoff",
  "",
  "- Target: Turn Response",
  "- Shape: Comment",
  "- Requirement: Required",
  "",
  "- Current Artifact: Name the one artifact that is current now.",
  "",
  "#### Trust Surface",
  "",
  "- `Current Artifact`",
  "",
  "- Standalone Read: This output should stand on its own. The next owner should know which artifact is current now.",
]
[[cases]]
name = "current artifact bindings require via carriers"
status = "active"
kind = "parse_fail"
prompt = "prompts/invalid_current_artifact_without_via/AGENTS.prompt"
exception_type = "ParseError"
error_code = "E133"
message_contains = [
  "Missing `via` carrier",
]

[[cases]]
name = "carrier refs reject unknown output fields"
status = "active"
kind = "compile_fail"
prompt = "prompts/invalid_via_unknown_output_field/AGENTS.prompt"
agent = "InvalidViaUnknownOutputField"
exception_type = "CompileError"
error_code = "E299"
location_line = 32

[[cases]]
name = "carrier fields must be listed in the trust surface"
status = "active"
kind = "compile_fail"
prompt = "prompts/invalid_via_field_not_in_trust_surface/AGENTS.prompt"
agent = "InvalidViaFieldNotInTrustSurface"
exception_type = "CompileError"
error_code = "E336"
location_line = 36

[[cases]]
name = "workflows that carry current truth must emit the carrier output"
status = "active"
kind = "compile_fail"
prompt = "prompts/invalid_carrier_output_not_emitted/AGENTS.prompt"
agent = "InvalidCarrierOutputNotEmitted"
exception_type = "CompileError"
error_code = "E333"
location_line = 41

[[cases]]
name = "current output artifacts must be emitted by the concrete turn"
status = "active"
kind = "compile_fail"
prompt = "prompts/invalid_current_output_not_emitted/AGENTS.prompt"
agent = "InvalidCurrentOutputNotEmitted"
exception_type = "CompileError"
error_code = "E334"
location_line = 33

[[cases]]
name = "current artifact targets must stay rooted in declared inputs or outputs"
status = "active"
kind = "compile_fail"
prompt = "prompts/invalid_current_target_wrong_kind/AGENTS.prompt"
agent = "InvalidCurrentTargetWrongKind"
exception_type = "CompileError"
error_code = "E335"
location_line = 31
