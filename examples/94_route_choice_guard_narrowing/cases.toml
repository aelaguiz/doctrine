schema_version = 1
default_prompt = "prompts/AGENTS.prompt"

[[cases]]
name = "route.choice guards may narrow branch-specific route detail"
status = "active"
kind = "render_contract"
agent = "RouteChoiceGuardDemo"
assertion = "exact_lines"
expected_lines = [
  "Use route.choice to narrow route detail.",
  "",
  "## Outputs",
  "",
  "### Proof Result",
  "",
  "- Target: Turn Response",
  "- Shape: Comment",
  "- Requirement: Required",
  "",
  "- Route Choice: `Route Choice`",
  "",
  "### Route Choice Reply",
  "",
  "- Target: Turn Response",
  "- Shape: Comment",
  "- Requirement: Required",
  "",
  "- Accept Summary: Show this only when route.choice is Accept. `Accept Summary` Send to AcceptanceCritic. Next owner: Acceptance Critic.",
  "- Change Owner: Show this only when route.choice is Change. `Change Owner` Change Engineer",
  "",
  "## Handoff Routing",
  "",
  "Choose a route from ProofResult.route_choice.",
  "Use exactly one route choice:",
  "- Accept",
  "- Change",
  "",
  "When the route choice is Accept:",
  "- Send to AcceptanceCritic.",
  "",
  "When the route choice is Change:",
  "- Send to ChangeEngineer.",
]
[[cases]]
name = "route.summary still needs one selected branch"
status = "active"
kind = "compile_fail"
prompt = "prompts/invalid_unguarded_route_summary/AGENTS.prompt"
agent = "InvalidRouteSummaryDemo"
exception_type = "CompileError"
error_code = "E347"
location_path = "prompts/invalid_unguarded_route_summary/AGENTS.prompt"

[[cases]]
name = "route.choice guards need every live route branch to come from route_from"
status = "active"
kind = "compile_fail"
prompt = "prompts/invalid_mixed_route_choice_guard/AGENTS.prompt"
agent = "InvalidMixedRouteChoiceGuardDemo"
exception_type = "CompileError"
error_code = "E338"
location_line = 19
