[[cases]]
name = "structure preservation targets must be addressable"
status = "planned"
kind = "compile_fail"
prompt = "prompts/INVALID_UNKNOWN_STRUCTURE_PRESERVE_TARGET.prompt"
agent = "InvalidUnknownStructurePreserveTarget"
exception_type = "CompileError"
message_contains = [
  "preserve structure",
  "missing_structure",
]

