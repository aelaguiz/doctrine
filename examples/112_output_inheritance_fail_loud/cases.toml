schema_version = 1
default_prompt = "prompts/AGENTS.prompt"

[[cases]]
name = "missing inherited output entry fails with E003"
status = "active"
kind = "compile_fail"
agent = "InvalidMissingInheritedOutputDemo"
exception_type = "CompileError"
error_code = "E003"
message_contains = [
  "Missing inherited output entry in LessonsLeadOutput",
  "must_include",
]

[[cases]]
name = "output patch syntax without inherited output fails with E252"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_PATCH_WITHOUT_PARENT.prompt"
agent = "InvalidPatchWithoutParentOutputDemo"
exception_type = "CompileError"
error_code = "E252"
message_contains = [
  "requires an inherited output in `LessonsLeadOutput`",
  "target",
]

[[cases]]
name = "undefined output inherit fails with E253"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_UNDEFINED_INHERIT.prompt"
agent = "InvalidUndefinedInheritOutputDemo"
exception_type = "CompileError"
error_code = "E253"
message_contains = [
  "cannot inherit undefined key `current_truth`",
]

[[cases]]
name = "inherited outputs fail loud when the parent has unkeyed top-level prose"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_UNKEYED_PARENT.prompt"
agent = "InvalidUnkeyedParentOutputDemo"
exception_type = "CompileError"
error_code = "E254"
message_contains = [
  "contains unkeyed top-level items",
  "prose",
]

[[cases]]
name = "output override kind mismatch fails with E255"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_OVERRIDE_KIND.prompt"
agent = "InvalidOverrideKindOutputDemo"
exception_type = "CompileError"
error_code = "E255"
message_contains = [
  "overrides entry `must_include` with the wrong kind",
]
