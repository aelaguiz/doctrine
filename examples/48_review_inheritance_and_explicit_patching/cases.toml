schema_version = 1
default_prompt = "prompts/AGENTS.prompt"

[[cases]]
name = "abstract review inheritance stays explicit and ordered"
status = "active"
kind = "render_contract"
agent = "PatchedDraftReviewDemo"
assertion = "exact_lines"
expected_lines = [
  "Keep inherited review surfaces explicit and accounted for.",
  "",
  "## Patched Draft Review",
  "",
  "Review subject: Draft Spec.",
  "Shared review contract: Patched Draft Review Contract.",
  "",
  "### Shared Checks",
  "",
  "Reject: The draft still lacks the shared context.",
  "",
  "### Child Specifics",
  "",
  "Accept only if The patched draft review contract passes.",
  "",
  "### If Accepted",
  "",
  "No artifact is current for this outcome.",
  "",
  "Accepted draft goes to ReviewLead.",
  "",
  "### If Rejected",
  "",
  "No artifact is current for this outcome.",
  "",
  "Rejected draft goes to DraftAuthor.",
  "",
  "## Inputs",
  "",
  "### Draft Spec",
  "",
  "- Source: File",
  "- Path: `unit_root/DRAFT_SPEC.md`",
  "- Shape: Markdown Document",
  "- Requirement: Required",
  "",
  "Use the current draft spec as the reviewed artifact.",
  "",
  "## Outputs",
  "",
  "### Inherited Review Comment",
  "",
  "| Contract | Value |",
  "| --- | --- |",
  "| Target | Turn Response |",
  "| Shape | Comment |",
  "| Requirement | Required |",
  "",
  "#### Verdict",
  "",
  "Say whether the review accepted the draft or asked for changes.",
  "",
  "#### Reviewed Artifact",
  "",
  "Name the reviewed artifact this review judged.",
  "",
  "#### Analysis Performed",
  "",
  "Sum up the review work that led to the verdict.",
  "",
  "#### Output Contents That Matter",
  "",
  "Summarize the parts of the draft the next owner must read first.",
  "",
  "#### Next Owner",
  "",
  "Name the next owner. Use ReviewLead when the draft is accepted and DraftAuthor when it is rejected.",
  "",
  "#### Failure Detail",
  "",
  "Show this only when verdict is changes requested.",
  "",
  "##### Failing Gates",
  "",
  "Name the failing review gates in authored order.",
  "",
  "#### Standalone Read",
  "",
  "This comment should stand on its own. The next owner should know what was reviewed, what verdict landed, who owns next, and which parts of the draft matter now.",
]

[[cases]]
name = "child reviews must account for inherited review sections"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_MISSING_INHERITED_SECTION.prompt"
agent = "InvalidMissingInheritedSectionDemo"
exception_type = "CompileError"
error_code = "E490"
message_contains = [
  "Missing inherited review entry",
  "shared_checks",
]

[[cases]]
name = "child reviews may not account for the same inherited section twice"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_DUPLICATE_INHERITED_SECTION_ACCOUNTING.prompt"
agent = "InvalidDuplicateInheritedSectionAccountingDemo"
exception_type = "CompileError"
error_code = "E491"
message_contains = [
  "Duplicate review item key",
  "shared_checks",
]

[[cases]]
name = "concrete agents may not attach abstract reviews directly"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_ABSTRACT_REVIEW_ON_CONCRETE_AGENT.prompt"
agent = "InvalidAbstractReviewOnConcreteAgentDemo"
exception_type = "CompileError"
error_code = "E494"
message_contains = [
  "Concrete agent may not attach abstract review directly",
  "BaseDraftReview",
]
