[[cases]]
name = "review case override cannot remove a gate the contract never declared"
status = "active"
kind = "compile_fail"
prompt = "prompts/invalid_remove_missing_gate/AGENTS.prompt"
agent = "BrokenRemoveDemo"
exception_type = "CompileError"
error_code = "E531"
location_line = 100

[[cases]]
name = "review case override cannot add a gate name that the contract already declares"
status = "active"
kind = "compile_fail"
prompt = "prompts/invalid_add_colliding_gate/AGENTS.prompt"
agent = "BrokenAddDemo"
exception_type = "CompileError"
error_code = "E532"
location_line = 101
