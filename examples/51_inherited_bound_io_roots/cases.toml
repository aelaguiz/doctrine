schema_version = 1
default_prompt = "prompts/AGENTS.prompt"

[[cases]]
name = "inherited io blocks keep bound roots available to workflow law"
status = "active"
kind = "render_contract"
agent = "InheritedBoundCurrentTruthDemo"
assertion = "exact_lines"
approx_ref = "ref/inherited_bound_current_truth_demo/AGENTS.md"
expected_lines = [
  "Carry current truth through inherited binding roots.",
  "",
  "## Carry Inherited Bound Current Truth",
  "",
  "Keep currentness attached to inherited concrete-turn bindings.",
  "",
  "Current artifact: Approved Plan.",
  "",
  "## Inputs",
  "",
  "### Approved Plan Binding",
  "",
  "#### Approved Plan",
  "",
  "- Source: File",
  "- Path: `unit_root/_authoring/APPROVED_PLAN.md`",
  "- Shape: Markdown Document",
  "- Requirement: Required",
  "",
  "## Outputs",
  "",
  "### Coordination Handoff Binding",
  "",
  "#### Coordination Handoff",
  "",
  "- Target: Turn Response",
  "- Shape: Comment",
  "- Requirement: Required",
  "",
  "##### Current Artifact",
  "",
  "Name the one artifact that is current now.",
  "",
  "##### Trust Surface",
  "",
  "- Current Artifact",
  "",
  "##### Standalone Read",
  "",
  "This output should stand on its own. The next owner should know which artifact is current now.",
]

[[cases]]
name = "conflicting concrete-turn bound roots fail loud"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_CONFLICTING_BOUND_ROOT.prompt"
agent = "InvalidConflictingBoundRootDemo"
exception_type = "CompileError"
error_code = "E260"
message_contains = [
  "Conflicting concrete-turn binding roots resolve different artifacts",
  "approved_plan",
]
