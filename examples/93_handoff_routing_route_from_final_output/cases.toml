schema_version = 1
default_prompt = "prompts/AGENTS.prompt"

[[cases]]
name = "handoff_routing may bind final_output route owner from an emitted output with route_from"
status = "active"
kind = "render_contract"
agent = "HandoffRouteFromFinalOutputDemo"
assertion = "exact_lines"
expected_lines = [
  "Read the selected handoff owner from an emitted output.",
  "",
  "## Outputs",
  "",
  "### Proof Result",
  "",
  "| Contract | Value |",
  "| --- | --- |",
  "| Target | Turn Response |",
  "| Shape | Comment |",
  "| Requirement | Required |",
  "",
  "- Route Choice: `Route Choice`",
  "",
  "## Final Output",
  "",
  "### Route From Final Reply",
  "",
  "> **Final answer contract**",
  "> End the turn with one final assistant message that follows this contract.",
  "",
  "| Contract | Value |",
  "| --- | --- |",
  "| Message type | Final assistant message |",
  "| Format | Natural-language markdown |",
  "| Shape | Comment |",
  "| Requirement | Required |",
  "- Next Owner: the selected route's next owner key",
  "",
  "## Handoff Routing",
  "",
  "Read the route choice from the emitted proof result.",
  "",
  "Select one route from ProofResult.route_choice.",
  "Use exactly one route choice:",
  "- Accept",
  "- Change",
  "",
  "If the route choice is Accept:",
  "- Send to AcceptanceCritic.",
  "",
  "If the route choice is Change:",
  "- Send to ChangeEngineer.",
]

[[cases]]
name = "handoff_routing route_from selector must name a declared emitted output field"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_SELECTOR_UNKNOWN_OUTPUT_FIELD.prompt"
agent = "InvalidHandoffRouteFromFieldDemo"
exception_type = "CompileError"
error_code = "E346"
message_contains = [
  "route_from selector",
  "ProofResult.missing_choice",
]

[[cases]]
name = "handoff_routing route_from selector must stay on emitted outputs"
status = "active"
kind = "compile_fail"
prompt = "prompts/INVALID_SELECTOR_NON_EMITTED_OUTPUT.prompt"
agent = "InvalidHandoffRouteFromOutputDemo"
exception_type = "CompileError"
error_code = "E346"
message_contains = [
  "route_from selector",
  "HiddenResult.route_choice",
]
